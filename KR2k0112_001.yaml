虜其衆十年周將王執來伐吳明徹退師全軍沒于清口自是江北之地盡入于周復以長江為界十二年周將以淮西地來降又遣將克新野尋失之及隋軍來伐遣將守狼尾灘今峽州宜都縣界是公安今江陵府縣是荆門安蜀地今峽州夷陵縣界是巴陵今嶽州巳下並風靡退散信州道大總管楊素自峽中舟師東下東之守將相繼而破信州即今雲安郡歸州是也隋軍自采石隋將韓擒虎襲陷之京口賀若弼襲陷之渡江而平之六朝建都南朝建都之地不過建康京口豫章江陵武昌數處其強弱利害前世論之詳矣吳孫䇿以會稽為根本大帝嗣立稍遷京口其後又嘗住公安又嘗都武昌蓋往來其間因時制宜不得不爾及江南巳定遂還建鄴保有荆揚而魏蜀抗衡其宏規逺略晉宋而下不能易也故孫皓捨建鄴而之武昌吳因以衰梁元帝舍建鄴而守江陵梁遂以亡李嗣主舍建鄴而還洪府南唐遂不能以立王導斷然折會稽豫章之論而以建鄴為根本自晉而下三百年之基業導之力也故孫皓議遷都武昌陸凱上疏曰武昌土地危險非王都安國養民之處船泊則沈漂陵居則峻危童謡云寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居夫民謡本于天心乃以安居而比死足明天意而知民所苦也蘇峻亂宗廟宫室並為煨燼溫嶠議遷豫章三吳之豪請都會稽二論紛紜未有所適王導曰古之金陵聖皇所居孫仲謀劉玄德皆言王者之宅古之帝王不以豐儉移都茍冠衛文大帛之冠何往不可若不績其麻樂土為墟矣由是嶠等之議不行齊蕭頴胄議遷夏口栁忱以巴峽未實不宜輕捨根本搖動人心帝不從俄而巴東之兵至峽口遷都之議遂息梁元帝臨荆峽二十年情所安戀不欲歸建鄴故府臣僚皆楚人並欲都江陵周洪正諌曰士大夫言聖王所都本無定處若黔首未見入建鄴便謂猶列國諸王今日副百姓心不可不歸建鄴南唐嗣主用唐鎬計遷豫章而王都官舍軍壘十不容其一二自公卿下至軍士莫不思歸自此論之六朝以來都邑之議莫不以建康為根本也六朝宫殿吳孫權遷都建鄴徙武昌宫室材瓦繕治太初宫吳實録有曰臺城蓋宫省之所寓也有曰東府蓋宰相之所居也有曰西州蓋諸王之所宅也有曰倉城蓋儲蓄之所在也宫室記云皆不出都城之內輿地志云都城二十里一十九步本吳宫址蓋謂是也晉琅琊王渡江鎮建鄴因吳舊都修而居之即太初宫為府舍及即帝位稱為建鄴宫更明帝不改至成帝繕苑城作新宫窮極伎巧侈靡殆甚宋齊而下因之稱為建康宫以此考之六代宫室門墻雖時有改築然皆因吳舊址晉新宫在吳太初宫之東吳昭明宫孫皓所起在晉建康宫城西南惟元帝建鄴宫乃仍吳太初宫之舊今缺行宫之東北乃其地也太初宫建康實録吳孫權黃武中徙武昌材瓦而增起即長沙王孫䇿故府在晉建康宫城西南即臺城之西南也建康宫建康實録晉成帝咸和七年新宫成名曰建康宫亦名顯陽宫注云即今之所謂臺城也輿地志云在法寶寺之南今在府北五里新宫晉謝安作新宫造太極殿欠一梁忽有梅朩流至石頭城下因取為梁殿成乃畫梅花于其上以表嘉瑞楊修有詩云玉案金爐對御牀巋然應是魯靈光螭頭直上雙魚尾不讓西京舊柏梁未央宫長樂宫建章宫長楊宫南史宋前廢帝景和元年以東府城為未央宫以石頭城為長樂宫以北邸為建章宫南第為長楊宫東府城在古青溪橋金華宫輿地志云梁大同中所築昭明太子蔡妃所居在青溪東披香殿楊修金陵詩注云在臺城後宫庾子山賦云宜春苑中春巳歸披香殿裏作春衣蓋指此也靈和殿在臺城內晉武帝時殿下栁本蜀郡所獻條如絲縷帝曰此栁風流可愛似張緒少年時緒字思曼楊修有詩云得地恩深雨露偏丹墀左右玉階前君王屬意君知否好似風流一少年六朝郊社終吳之世未暇禮文宗廟社稷不見於史晉初置宗廟在吳都城宣陽門外輿地志云在縣東二里圗經云大社大稷壇在縣南二里宋齊而下時有改易晉元帝二年作南郊在宫城南十五里郭璞卜立之輿地志云在今縣城東南十八里圗經云古南郊壇在縣南十八里成帝作北郊壇于覆舟山之陽制度一如南郊實録云北郊壇在縣東八里潮溝後東近青溪又按通典宋孝武帝大明三年移北郊于鍾山北原道西今鍾山定林寺山巔有平基二所濶數十丈乃其地也南唐郊壇在長樂鄉去縣十二里遺址尚存今為藏氷之所六朝郡國三國鼎立之後土宇分裂得失不常魏武定霸所置郡國十二新興譙樂平陵西平武新平鄉略陽平帶襄方樂章南隂陽而省者七上郡定朔方漁五原廬雲中襄陽江文帝置七朝歌陽平城弋陽陽魏興豐新義安明及少帝增二上庸陽平得漢郡者五十四焉蜀先主於漢建安之間初置郡九巴東梓巴西潼江陽朱提汶山宕渠漢嘉涪陵後主增二雲安興古得漢郡者十有一焉吳大帝初置郡五臨賀廬珠崖新武昌陵安少帝景帝各四臨川建臨海天衡陽合湘東部建安平門浦北歸命侯亦置十有二郡始安安成始興新昌邵陵武平九德桂林吳興滎陽東陽宜都得漢郡者十有八焉晉武太康元年既平孫氏凡增置郡國二十有三滎陽長頓丘廣上洛昌臨淮新東莞隨襄城隂汝隂廣寧黎野郡平義陽寧浦毗陵始平宣城略陽南康樂平晉安南平省司𨽻置司州别立梁秦寧平四州仍吳之廣州凡十九司豫冀兖荆徐揚青幽平并雍梁秦涼益寧交廣郡國一百七十三仍吳所置二十五仍蜀所置十一仍魏所置二十一仍漢舊九十三置二十三惠帝不君中州盡棄永嘉南渡建鄴今建康也開基九州之地有二焉自兹以降國分南北更王迭霸疆理不常宋至孝武大明中州凡二十有二郡二百三十有八縣千一百七十有九南齊繼統又置巴東一郡餘並因之為州二十有三郡三百九十五縣千四百七十有四頻與元魏侵吞互相得失蕭梁之時多沿舊制天監中有州二十有三郡三百五十縣千二十有五其後更有析置大同中州百有七郡縣亦稱於此陳氏較之土宇彌蹙西不得蜀漢北失淮淝而以長江為境有州四十有二是其地愈狹立名益多為郡百有九縣四百三十有八此皆疆宇之列乎南者也六朝保守晉蔡謨曰時有否泰道有屈伸暴逆之冦雖終滅亡方其強盛皆當詘而避之要終歸于大濟而已為今之計莫若養威以俟時王羲之曰以區區江左營綜如此天下寒心久矣中興之業政以道勝寬和為本力爭武功非所當作二人者能言之而不得行之行之而足以安江南者孫權一人耳陸瑁嘗勸權曰九域盤互之時率須深根固本愛力惜費陸遜嘗勸權曰施德緩刑寬賦息調權報之曰發調者蓋謂天下未定事以衆濟若徒守江東修崇寬政兵自足用何以多為顧坐自守可陋耳以此知權之志未嘗不在于天下然以傳考之亦未嘗求逞于中國曹公來侵則破之拒之而巳治艦立塢築堤遏湖作凃塘明烽燧始終所以偹魏者至矣及移箋于曹公曰足下不死孤不得安則權固未嘗得志也嘉禾中因蜀冦魏一攻淮南聞明帝東行則遽斂避諸將之攻樊城司馬懿救之亦引軍亟退自後世觀之謂之怯可也而權不以為恥豈非天下之勢既未有可投之隙與其力爭而取敗不若退守而待時也耶史稱權繼父兄之業有臣以為腹心股肱爪牙兵不妄動故戰少敗而江南安此權之所以為智也及嗣主立諸葛恪為政首侵邊以怒敵東興之戰幸捷顧不能持勝復違衆大舉一敗塗地恪既喪軀而孫氏之業因以衰焉則權之兵不妄動利害果何如也其後孫皓用諸將計數侵入晉鄙陸抗曰茍無其時雖復大聖亦宜養威自保不可輕動今不務力農冨國審官任能明黜陟慎刑罰訓諸司以德拊百姓以仁而聽諸將徇名窮兵黷武動費萬計士卒凋弊冦不為衰而我巳大病矣夫爭帝王之資而昧十百之利此人臣之姦謀非國家之良䇿也抗之言兼有陸瑁陸遜蔡謨王羲之之論而皓不之用此其所以亡也東晉自庾亮經營征伐皆不能有成謝安父子乘苻堅傾敗之餘圗之如恐不及也至于渡河入鄴訖無尺寸之得宋文自以富強詰戎兵于元魏道濟再行無功皆諸將以敗繼敗而胡馬遂至瓜步梁武遭魏氏之亂陳慶之以數千兵入洛而嵩髙之襲幾至殲盡及貪河南之地納叛將棄睦鄰而身國顛覆陳宣帝始稍闢土宇于北齊旋失淮泗于後周雖以桓溫劉裕非常之才度越厯代諸將而溫伐苻健慕容暐皆幾成而敗裕平南燕滅姚秦亦既得而失則六朝用兵攻伐之策可見矣形勢門第二鍾阜建康之東餘見寺苑門蔣山寺圖經云在縣東北周回六十里髙一百五十八丈東連青龍山西臨青溪南自鍾浦下入秦淮北接雉亭山漢末有秣陵尉蔣子文逐盜死於鍾山吳大帝為立廟封曰蔣侯吳録云大帝祖諱鍾因改名曰蔣山按丹陽記云京師南北並連山嶺而蔣山岧嶤嶷異其形象龍實作揚都之鎮諸葛亮嘗至京觀秣陵山阜云鍾山龍盤蓋謂此也又按輿地志云鍾山本少林朩宋時使諸州刺史罷職還者栽松三千株下至郡守各有差焉山之最髙峯地有五願樹樹柞朩也宋元嘉中百姓祈禱率有應驗寰宇記云自梁以前立寺七十所今存者六又按南史宋散騎常侍劉勔經始鍾嶺之南以為栖息聚石蓄水朝士雅素者多從之遊又雷次宗元嘉中開館雞籠山文帝為築室于鍾山西巖下謂之招隱館至齊周顒亦于鍾山西立隱舍休沐則歸後顒出為海鹽令孔稚圭作北山移文以譏之舊經云晉謝尚齊朱應吳苞孔嗣之梁阮孝緒劉孝標並隱于此唐大厯中處士韋渠牟亦隱此山號遺名子顔真卿題其所隱之堂曰遺名先生三教會宗堂又陳後主與張機遊是山嘗以松枝代麈尾故梅摯詩有千松缺麈尾之句又按文選沈休文鍾山應教詩云靈山紀地德險峭資嶽靈又云勢隨九疑髙氣與三山壯蓋美之也荆公絶句云偶向松關覓舊題野人休誦北山移丈夫出處非無意猿鶴從來自不知又一絶云澗水無聲繞竹流竹間花影弄春柔茅簷相對坐終日一鳥不鳴山更幽又一絶云終日看山不厭山買山終待老山間山花落盡山長在山水空流山自間今屬惟政鄉去縣十里石城建康之西吳孫權沿淮立柵又於江岸必爭之地築城名曰石頭常以腹心大臣鎮守之今石城故基乃楊行密稍遷近南夾淮帶江以盡地利其形勢與長干山連接輿地志云環七里一百步在縣西五里去臺城九里南抵秦淮口今清涼寺之西是也諸葛亮論金陵地形云鍾阜龍盤石城虎踞真帝王之宅正謂此也及晉伐吳王濬以舟師沿江而下自三山抵石城劉夢得金陵懷古曰王濬樓船下益州金陵王氣黯然收千尋鐵鎖沈江底一片降幡出石頭荒苑至今生茂草古城依舊枕寒流而今四海歸皇化兩岸蕭蕭蘆荻秋宋順帝升明元年以司徒袁粲出鎮於此由晉以來常為戰守之地左太沖吳都賦云戎車盈于石頭蓋謂此也宋大明中以其地為離宫及齊武帝為世子即以為世子宫城之東有巨石俗呼為塘岡乃王敦害周伯仁戴若思之處按建康實録晉元帝永昌元年敦收周顗戴淵殺於石頭城東塘頽石上百姓寃之至今紀其處至陳宣帝太建二年其城復加修築以貯軍倉後主禎明元年徐孝克為都官尚書性清素常以石頭津稅給之唐武后光宅中徐敬業舉兵使其徒崔洪渡江修石頭以拒之敬業平分軍三百人守之尋置為鎮仍徙縣倉以實之故唐書地理志云升州有石頭鎮中宗神龍二年廢鎮即移倉于冶城德宗時浙江觀察使韓滉乃於石頭築五城今遺址尚在江南野史汪台符上書陳民間九患為宋齊邱所沮後齊邱使人夜縛其口沈石城下先主聞而歎之江淹侍始安王石頭城詩曰開局繞天邑襟帶闕何遜登石頭城詩曰天暮逺山青潮去邊沙出皆謂此也朱雀航建康之南晉咸康二年作朱雀門新立朱雀浮航在縣城東南四里對朱雀門南渡淮水亦名朱雀橋輿地志云吳南津大航橋也王敦作亂溫嶠燒絶至是始用杜預河橋法作之地志云朱雀門北對吳都城宣陽門相去六里為御道夾御溝植栁自朱雀門南渡出國門羅鄴金陵野步望宫栁詩云色承陽氣暖隂帶御溝清里俗相傳今桐樹灣相對浮橋即其地也真武湖建康之北按建康實録吳後主皓寶鼎元年開城北渠引後湖水流入新宫巡繞殿堂窮極伎巧至晉元帝始創為北湖故實録云元帝大興三年創北湖築長堤以遏北山之水東至覆舟山西至宣武城又按南史宋文帝元嘉二十三年築北堤立真武湖於樂逰苑之北湖中亭臺四所後黑龍見于湖側春秋使道士祀之至孝武大明五年常閲武于湖西七年又于此湖大閲水軍按輿地志云齊武帝亦常理水軍于此號曰昆明池故沈約登覆舟山詩南瞻儲胥館北眺昆明池蓋謂此也又于湖側作大竇通水入華林園天淵池引殿內諸溝經太極殿由東西掖門下注城南塹故臺中諸溝水常縈流回轉不舍晝夜又按南史元嘉二十三年開真武湖文帝于湖中立方丈蓬萊瀛洲三神山尚書右僕射何尚之固諫乃止今圗經云湖中有蓬萊方丈瀛洲三神山不知何所據也本朝天禧四年改為放生池其後廢湖為田中開十字河立四斗門以泄湖水跨河為橋以通往來今城北十三里有古池俗呼為後湖見作大軍教場處是也城闕門第三越城春秋時越既滅吳盡有江南之地於是築城江上以鎮江險圗經云周回二里八十步在秣陵縣長千里後崔慧景冦建鄴蕭懿入援自采石濟岸頓越城舉火臺上鼓噪相慶兹建康之南也今南門外有越臺與天禧寺相對見作軍寨處是也吳固城圗經云在溧水縣西南九十里髙一丈五尺羅城周回七里二百三十步子城一百一里九十步勝公廟記吳時瀨渚縣也楚靈王與吳戰吳兵不利遂陷此城吳乃移瀨渚于溧陽南十里改為陵平縣靈王崩平王立使蘇乃為將戰于吳吳軍敗收吳陵平縣自平王聽費無忌佞言伍胥奔吳闔閭用為將舉兵破楚奔南海固城宫殿逾月煙焰不滅其城遂廢金城建康實録金城吳築晉桓溫咸康七年出鎮江乘之金城後溫北伐經金城見為琅琊時所種栁皆十圍因歎曰朩猶如此人何以堪因攀枝執條泫然流涕楊修金城詩亦引此為據又按古圗經晉中宗于金城立琅琊郡溫嘗為琅琊內史至咸康七年出鎮金城前云琅琊蓋指此也今去府城三十五里冶城今天慶觀即其地也本吳冶鑄之所因以為名寰宇記晉元帝太興初以王導疾久方士戴洋云君本命在申而申地有冶金火相爍不利遂移冶城于石頭城東以其地為園徐廣晉記云成帝適司徒府觀冶城園即此也琅琊郡城寰宇記云晉元帝過江為琅琊王國人立也其城在江乘縣界王隱晉書及山謙之南徐州記云江乘南岸蒲洲津有琅琊城并立琅琊內史以治之圗經云在縣東北六十三里今句容縣有琅琊鄉亦其地也又按寰宇記齊武帝永明六年移琅琊郡于白下在縣北十八里圗經直以蒲洲津城為白下非也又按南史武帝永明六年于琅琊城講武習水步軍九年又幸其城講武觀者傾都梁徐欽業登琅琊城詩曰表裏窮形勝襟帶盡巖巒登陴起遐望回首見長安建康縣城吳冶城東今天慶觀東是其地寰宇記云在縣西一里晉太康三年分淮水北為建康縣上元之地居多同夏縣城南史梁武帝以宋孝武大明元年生于秣陵縣同夏里三橋宅及即位大同元年分同夏里為同夏縣寰宇記云在城東十五里其地在長樂鄉白下縣城按圗經及寰宇記引輿地志云本江乘之白石壘也齊武帝以其地帶江山之勝移琅琊居之唐武德元年罷金陵縣築城于此因其舊名曰白下貞觀七年復舊治此地遂廢今考唐書地里志云武德三年更江寧縣曰歸化八年更歸化曰金陵九年更金陵曰白下𨽻潤州貞觀九年復更白下曰江寧前説興廢本末與此不同宜以唐史為正又按南史齊武帝欲修白下城難于動役劉係宗啓謫役在東晉者上從之後武帝講武白下履行其地曰係宗為國家得此一城圗經云在西北十四里今靖安鎮北有白下城故基父老傳云即此地也屬金陵鄉去府城十八里臨沂縣城按輿地志云晉成帝咸康三年分江乘縣置臨沂縣𨽻琅琊陳亡廢矣在府城北三十里蔣州城杜佑通典隋平陳於石城置蔣州寰宇記輔公祏據江東用為揚州唐趙郡王孝恭平公祏又於其城置揚州大都督後徙揚州於廣陵此城遂廢臺城建康實録晉成帝咸和七年新宫成名建康宫注云今之所謂臺城也在縣東北五里周回八里又按輿地志云同泰寺南與臺城隔路今法寶寺及圎寂寺即古同泰寺基故法寶亦名臺城院以此考之法寶圎寂寺之南蓋古臺城地也今之基址尚在元和初陸喬家于丹陽一夕有叩門者曰我沈約也呼左右召青箱來俄一兒至約指謂曰此吾子也近從吾過臺城命為感舊詩因諷曰六代舊山川興亡幾百年繁華今寂寞朝市昔喧闐夜月琉璃水春風栁色天傷時與懷古垂淚國門前楊修有詩云六朝遺迹好山川宫闕灰寒草樹煙江令白頭歸故國多情合賦黍離篇檀城輿地志云本謝玄之别墅太傅謝安與玄奕棊所勝者至宋屬檀道濟故名檀城圗經云在縣東八里今按建康實録在墅城東八里非去縣東八里也地圖謂之城子墅今清風鄉有城子墅在黃城橋之西即其地去府城四十里石闕縣北五里有四石闕在臺城之門南髙五丈廣三丈六寸梁武帝所造及成朝士銘之時陸倕字佐公其文甚佳士流推伏侯景作亂焚燒宗廟城郭府寺百無一存尋髙麗百濟等國入貢見其雕殘遂哭于闕下楊修有詩云雙石巍巍慰眼青滿朝珍重佐公銘宫城府寺俱灰燼翻使夷人謾涕零朱雀門晉都城南門也按晉作新宫立三門于南面正中曰宣陽與朱雀門相對王導嘗出宣陽門望牛首山兩峰相向導指為天闕牛首山在今城南門近東面勢正與桐樹灣相對以其地考之今上元左南廂也白下門兩漢地里志未有白下縣按南史宋明帝時聞人謂宣陽門為白門以為不祥甚諱之右丞江謐誤犯帝變色曰白汝家門按唐會要及地理志武德二年更江寧曰歸化八年又更歸化曰金陵九年更金陵曰白下貞觀九年又更白下曰江寧則白下縣始于此然未知其得名之因一説謂春秋時楚使子朩之子勝處吳邑為白公金陵吳邑也恐白之得名自此始一説謂本江乘縣之白石壘以其地帶江山之勝故為城于此曰白下城東門謂之白下正其往路也一説謂齊武帝時巳閲武于白下自唐武德以後因之也荆公東門詩有東門白下亭之句參寥訪荆公詩曰苦嫌榮祿早收身歸與漁樵共隱淪白下門西山迤邐興來長是岸烏巾徐師川詩曰廣陵才過又金陵白社還思白下亭鴈翅夾連千里浪蛾眉山出兩峯青正謂此也丹陽門丹陽丹楊丹徒各自有義按前漢志秦鄣郡乃漢丹陽郡武帝二年更名也九域志引江南地志云漢丹陽郡北有赭山丹赤故因名曰丹陽至東晉始以丹楊為義按地理志建鄴秣陵丹楊句容溧陽江寧皆𨽻丹陽郡屬揚州所統注云丹陽山多赤栁在郡西故曰丹楊丹徒春秋時謂之朱方按建康實録孫權鎮京口注曰秦始皇發赭衣刑徒伐山開道故名邑曰丹徒樓臺門第四亭館附落星樓圗經在縣東北臨沂縣前吳大帝時山上置三層樓樓髙以此為名左太沖吳都賦云饗戎旅乎落星之樓是也今石步相去一里半有落星墩里俗相傳即當時建樓處今去城四十里烽火樓圗經云在石頭城西南最髙處楊修詩注云沿江築臺以舉烽燧自建康至江陵五千七百里有警半日而達按南史宋文帝元嘉二十七年魏太武至瓜步聲欲渡江始議北侵朝士多有不同至是帝登烽火樓極望不悅謂江湛曰北伐之計同議者少今日貽大夫之憂在豫過矣又齊武帝登烽火樓詔羣臣賦詩蕭頴胄詩合旨帝謂頴胄曰宗室便不乏才景陽樓輿地志云宋元嘉二十二年築至孝武大明中紫雲出景陽樓因名之今法寶寺西南遺址尚存入漢樓東晉書云義熙八年于石頭城東起入漢樓在城西門外梁昭明書臺舊傳梁昭明太子著書于此今遺址尚存蔣山定林寺後山北髙峯上衛玠臺晉書云玠字叔寶初字豫章南辭王敦歸建鄴都人聞其姿容觀者如堵尋以疾終年二十七時人謂之看殺葬江寧楊修有詩云年少才非洗馬才珠光碎後玉光埋江南第一風流者無復羊車過舊街其臺傳在城南十里周處臺亦名子隱臺府雉東南有故臺基曰周處臺今鹿苑寺之後梅摯記云按西晉史處字子隱義興陽羡人弱冠時好馳騁不修細行州曲患之自知為衆所惡慨然有激勵之志里人以三害切諷於是射虎斬蛟往見陸雲具以誠告曰古人學道貴朝聞夕死君前途尚可第患志之不立何憂名之不彰遂退而嚮學有文言必信行必謹如是期年州府交辟仕吳為東觀左丞吳平入洛纍遷郡太守率有善狀拜御史中丞凡所紏劾不避權貴卒樹功名沒世逺耀噫天地至大根一氣陶萬化未始無過隂陽寒暑小有繆戾則從而改之卒歸大順而况于人乎古聖賢本天地之性以修其性亦未嘗諱過後之人不獨諱之而巳抑又從而文之自底悔尤良可嗟惜惟子隱少而不逞長乃自悟一旦畨然去惡即善遂為名世忠賢可不重乎則中人所稟因物染遷為時詿誤德有小眚言有小疵未甚子隱之害于其鄉又何憚改為哉豫因來是臺新是堂非止卜髙明之居也包逰覽之勝而與民同樂亦將有激時世云九日臺南史齊武帝永明四年四月作商飇館于孫陵岡世呼為九日臺十道四蕃志云武帝九月九日以宴羣臣孫陵岡即吳大帝蔣陵今在鍾山鄉蔣廟之西南俗呼為松陵岡去縣十二里楊修有詩云甲光如水戟如霜御酒杯浮菊半黃東日西風滿天仗簫韶一部奏清商雨花臺梁武帝時有雲光法師講經于此感得天雨賜花天厨獻食荆公有詩云盤直長干有絶陘并包佳麗入江亭新霜浦溆綿綿靜薄晚林巒往往青楊無為有詩云空書來震旦康樂造淵微貝葉深山譯曼花半夜飛香清雖透筆蘂散不霑衣舊社白蓮老逺公應望歸新亭晉初元帝渡江僕射周顗與羣臣逰宴坐中歎云雖風土不殊舉目有江山之異因而流涕王導曰諸公當須戮力中原以壯王室何為作楚囚悲邪衆皆肅然整容宋孝武即位于新亭僕射王僧達改為中興亭城南十五里俯近江渚楊修有詩云滿目江山異洛陽北人懷土淚千行不如亡國中書令歸老新亭是故鄉五馬亭晉元帝與彭城王玄西陽王羕南頓王宗汝南王宏南渡之後當時讖云五馬浮渡江一馬化為龍謂此也亭今廢其地屬金陵鄉去城西二十五里幕府山之側賞心亭丁晉公建也公以家藏袁安卧雪圗張于其屏乃唐周昉筆經十四太守無敢覬覦者後為一太守以凡筆畫蘆鴈易之王琪密學來作守登臨賦詩曰千里秦淮在玉壺江山清麗壯吳都昔人已化遼天鶴舊畫難尋卧雪圗冉冉流年去京國蕭蕭華髮老江湖殘蟬不會登臨意又噪西風入坐隅荆公有詩云檻折簷傾野水傍臺城佳氣巳消亡誰披草莽尋千古獨倚青冥望八荒坐覺塵沙昏逺眼忽看風雨破驕陽扁舟此日東南興欲望江流萬里長又詩云霸氣消磨不復存舊朝臺殿只空村孤城倚薄青天近細雨侵尋白日昏稍覺野雲成晚霽却疑山月是朝暾此時江海無窮興醒客無言醉容喧白下亭李白金陵白下亭留别詩云驛亭三楊樹正當白下門王荆公有詩云東門白下亭摧甓蔓寒葩則亭在東門明矣荆公舊宅在今報寧寺故基其詩有門前秋水可揚舲有意西尋白下亭之句今廢矣東冶亭晉太元中於汝南灣東南置亭為士大夫餞送之所楊修有詩曰忍淚相看酒共持一生心事幾人知年年折盡東亭栁此别綿綿無盡期舊傳在縣東八里翠微亭城西五里清涼寺山頂南唐時建林逋有詩云亭在江干寺清涼更翠微陳軒金陵詩集注云清涼寺翠微亭最為佳處三山亭城西五里清涼寺石頭城之西面對三山其地屬金陵鄉儒學館南史宋文帝元嘉十五年立儒學館于北郊命雷次宗居之即今覆舟山之南也湯泉館徐鉉有湯泉舊館詩今遺基尚存在神泉鄉湯山之下儀賢堂建康實録吳時造號為中堂楊修詩注云在臺城內梁武帝謙恭待士大通中有四人來年七十餘鶉衣躡履行丏經年無人知者帝召入儀賢堂給湯沐解御服賜之帝問三教九流及漢舊事了如目前帝心異之舉朝無識者惟昭明太子識而禮重之四人喜揖昭明如舊交時目之為四公子楊修有詩云兩兩鶉衣白髮翁講筵談柄坐生風昭明太子歡相得應與商山四皓同祓禊堂楊修金陵詩注云在縣北五里臺城內天淵池中架石引水為流杯之所六朝上巳日宴錫公卿于此輿地志云宋元嘉二十二年鑿天淵池造景陽樓今法寶寺之南有景陽樓古基側有池舊傳即天淵池歲久湮沒今不復有堂矣聽筝堂晉元帝幸謝安宅命宴安侍坐使桓伊吹笛為一㺯畢又撫筝按金縢曲聲伊慷慨俯仰可觀安淚下霑襟乃越席捋其鬚曰使君于此不凡帝甚有愧色此堂基至今樵采者不敢近楊修詩云鴈柱鸞絃十有三南山安石位巖巖逡巡奏罷金縢曲堂上霑襟嘆不凡蠶室𨽻縣北七里耆闍寺前沙市中六朝皇后親蠶之所也楊修詩云摘繭抽絲女在機茅簷葦箔舊堂扉年年桑柘如雲緑翻織誰家錦地衣三閣陳後主至德二年於光昭殿前起臨春結綺望仙三閣髙數十丈並數十間其窗牖戶壁欄檻之類皆以沈檀為之又飾以金玉間以珠翠外施珠簾內設寶帳其服玩之屬瑰麗皆近古所未有每微風至香聞數里朝日初照光映後庭其下積石為山引水為池植以竒樹雜以花藥後主自居臨春閣張麗華居結綺閣麗華本兵家女以織席為業龔孔二貴妃居望仙閣並復道交相往來以宫人有文學者袁大捨等為女學士後主每引賔客江揔等對貴妃逰宴則使諸貴人及女學士與狎客賦詩互相贈答采其尤艷麗者以為詞被以新聲采宫女有容色者千百數習而歌之分部迭進持以相樂其曲有玉樹後庭花臨春樂等麗華聰慧有神采嘗于閣上靚粧臨于軒檻宫中遙望飄若神仙才辨強記善候人顔色薦諸宫女後宫咸德之又工厭魅之術假鬼道以惑後主置淫祀于宫中聚諸女巫使之鼓舞時後主怠於政事百官啓奏並因宦者蔡臨兒李善度進請後主每置張麗華于膝上共決之大臣有不從者因而譛之言無不聽於是張孔之權熏灼四方內外交結貨賄公行賞罰無常綱紀瞀亂矣及隋軍克臺城二妃與後主俱入井隋軍出之晉王廣命斬之于青溪柵下北史髙熲傳隋平陳晉王廣欲納張麗華熲曰武王伐紂戮妲巳今陳平不宜取麗華乃命斬之當以北史為正馳道宋孝武帝作馳道自閶闔北出承明抵玄武湖十餘里為調馬之所也楊修有詩云路平如砥直如絃官栁千株拂翠煙玉勒金羈天下駿急于奔電更揮鞭齊雲觀陳後主禎明二年建在臺城內國人歌曰齊雲觀寇來無際畔楊修詩云上界笙歌下界間縷金羅袖鬱金裙倚欄紅粉如花面不見巫山空暮雲層城觀亦名穿針樓輿地志云齊武帝七月七日使宫人集此是夕穿針以為乞巧之所亦曰穿針樓在臺城內楊修有詩云秋星如彈月如梳宫妓香添乞巧爐萬縷千針同一意眼穿腸斷得知無桂林苑寰宇記云桂林苑在縣北落星山之陽左太沖吳都賦云數軍實乎桂林之苑即此地也樂遊苑輿地志云在晉為藥園宋元嘉中以其地為北苑更造樓觀後改為樂遊苑宋孝武大明中造正陽林光殿于內侯景之亂焚毁略盡陳天嘉六年更加修葺陳亡遂廢又按實録宋文帝元嘉十一年三月禊飲于樂遊苑會者賦詩顔延之為序南史梁大通三年武帝幸樂遊苑時新造兩刀矟山卓切成帝因賜羊侃河南國紫騮馬試之侃執矟上馬左右擊刺特盡其妙觀者登樹樹俄而折因號其矟為折樹矟及陳宣帝即位北齊使常侍李騊駼來聘賜宴樂遊苑尚書令江總作詩以贈之寰宇記云其地在覆舟山南去縣六里上林苑南史宋孝武大明三年於真武湖北立上林苑建康實録云在縣北十三里有古池俗呼為飲馬塘楊修詩注云其苑連雞籠山在縣北七里芳林苑寰宇記云芳林苑一名桃花園本齊髙帝舊宅在府城之東秦淮大路北武帝永明五年嘗幸其苑禊宴王融曲水詩序云載懷平浦乃眷芳林蓋此也又按南史齊時青溪宫改為芳林苑梁天監初賜南平元襄王為第益加穿築果朩珍竒窮極雕靡命蕭子範為之記蕃邸之盛無過焉芳樂苑齊東昏侯方在位時與宫人於閲武堂元會皇后正位閹人行儀帝戎服臨視又于閲武堂為芳樂苑窮竒極麗多種樹朩日與潘妃放恣褻瀆不可言明帝崩竟不一日蔬食居處衣服無改常潘妃生女百日而亡制斬衰杖絰衣悉粗布羣小來弔盤旋地坐舉手受執蔬膳積句不聽音樂左右直長閹豎等共營肴羞為天子解菜又于苑中立店肆模大市日遊市中雜所貨物與宫人閹豎共為禆販以潘妃為市令自為市吏録事將鬬者就妃罰之帝小有得失潘則杖又開渠立埭躬自引船埭上設店坐而屠肉于時百姓歌云閲武堂種楊栁至尊屠肉潘妃酤酒江河門第五溝渠溪井附大江西接江寧界東接句容界北接真州六合縣界沿流一百二十里按三國志吳書魏文帝有渡江之志徐盛從建鄴築圍上設假樓江中浮船文帝到廣陵望圍愕然彌漫數百里而江水盛長便引退文帝嘆曰魏雖有武騎千羣無所用也又按江南野史周世宗問孫忌江南虛實忌曰長江千里險過湯池可敵十萬之師世宗聞而忌之秦淮秦始皇東巡會稽經秣陵因鑿鍾山斷金陵長隴以疏淮或云斷金陵長隴乃方山也其淮本名龍藏浦上有二源一源發自華山經句容西南流華山在句容縣界髙九里似蔣山一源發自東廬山經溧水西北流入江寧界東廬山在溧水縣東南十五里髙六十八丈周回二十里山西一源入秦淮二源合自方山埭西注大江其分𣲖屈曲不類人功疑非秦皇所開而後人因名秦淮者以鑿方山言之楊修詩曰一氣東南王斗牛祖龍潛為子孫憂金陵地脈何曾斷不覺真人已姓劉直瀆吳後主孫皓所開𨽻鍾山鄉去縣三十五里西至霸埂東北接竹港流入大江楊修詩注云瀆在幕府山東北長十四里濶五丈深一丈初開之時晝穿夜復自塞經年不就傷足役夫卧其側夜見鬼物來填因嗟嘆曰何不以布囊盛土棄之江中使吾徒免殫力于此傷者異之曉白有司如其言乃成瀆道直故名曰直瀆輿地志曰白下城西南蟹浦浦西北有直瀆伏滔北征記云吳將甘寧墓在此俗云墓有王氣孫皓惡之乃鑿其後為直瀆又按晉書蘇峻舉兵溫嶠帥師救京師遣王愆鄧期兵為前鋒次直瀆即此地也楊修有詩曰晝役人功夜鬼功陽開隂闔幾時終不聞擲土江中語爭得盈流一水通橫塘吳大帝時自江口沿淮築堤謂之橫塘楊修有詩云早潮才過晚潮來一一軒窗照水開鑑面無塵風不動分明倒影見樓臺青溪建康實録吳赤烏四年冬鑿東渠名為青溪寰宇記云青溪在縣東六里濶五丈深八尺以泄真武湖水輿地志云青溪發源鍾山入于淮連綿十餘里溪口有埭埭側有神祠曰青溪姑今縣東有渠北接覆舟山以近後湖里俗相傳此青溪也其水迤邐西出至今上水閘相近皆名青溪陶季直京都記云京師鼎族多在青溪埭尚書孫瑒尚書令江總宅當時並列溪北又南史齊永明元年望氣者言新林婁湖有王者氣帝乃築青溪舊宫作新婁湖苑以厭之又實録云郗僧施泛舟溪中每經一曲作詩一首隋煬帝平陳斬張麗華孔貴妃二人于此柵下楊修有詩云傾城傾國兩妃嬪此地聞名不見人潛想舊時紅粉面落花風裏步香塵潮溝輿地志潮溝吳大帝所開以引江潮建康實録云其北又開一瀆北至後湖以引湖水今俗呼為運瀆其實自古城西南行者是運瀆自歸蔣山寺門前東出至青溪者名潮溝其溝向東已湮塞西則見通運瀆按實録所載皆唐事距今數百年其溝日益湮塞未詳所在今府城東門外西抵城濠有溝東出曲折當報寧寺之前里俗亦名潮溝此近世所開非古潮溝也霹靂溝王荆公詩云霹靂溝西路柴荆四五家憶曾騎欵段隨意入桃花在城東五里北渠吳後主引北湖水入宫城巡繞堂殿極機巧費役萬工楊修有詩云金殿分來玉砌流黑龍湖撒鳳池頭後庭花落恩波斷翻與南唐作御溝在城北二里蟹浦輿地志云白下城西南有蟹浦源出鍾山北流九里入大江在城西北十六里覆杯池晉元帝中興頗以酒廢政丞相王導奏諌帝因覆杯于池中以為誡楊修有詩云金杯覆處舊池枯此後還曾一醉無東晉中興股肱力元皇亦學管夷吾今城北三里西池是也落義池蔣山寶公塔之東悟真菴前舊傳迦毗羅神隋梵僧密多至此與神交戰落義于此池因以得名三巖石臺城內千福禪院本梁同泰寺後吳順義二年置院前有醜石四各髙丈餘又三巖山西有白蓮閣閣下有小石池面方一丈餘言是陳時景陽井今有古石井欄其上本鐫刻文字悉已殘毁惟戒哉二字可辨今名法寶院楊修有詩曰蘿蔓藤花歲自添露痕還似雨痕霑莫將廢苑為間地猶可巖巖使具瞻邀笛步舊名蕭家渡在城東南青溪橋之右今上水閘是也晉書云桓伊善樂盡一時之妙為江左第一有蔡雍柯亭笛常自吹之王徽之赴召京師泊舟青溪側伊素不與徽之相識自岸上過船中客稱伊小字曰此桓野王也徽之令人諭之曰勝聞君善吹笛為我一奏伊是時貴顯素聞徽之名便下車踞胡牀為作三調弄畢便上車去客主不交一言故今名為邀笛步也迎擔湖南徐州記云費縣西北八里有迎擔湖昔晉永嘉中元帝南遷衣冠席卷過江客主相迎湖側遂以此為名在府西北五里石城後其湖溉田三十里太子湖吳宣明太子孫登所創謂之西池晉元帝即位明帝為太子更加修之多養武士於池內築土為臺時人呼為太子西池建康實録云晉太元十年夏四月苻堅為姚萇慕容沖所迫遣使求救詔太保謝安率衆救秦帝自行西池在城北六里周回十里蘇峻湖南徐州記云迎擔湖西北有蘇峻湖本名曰石陂建康實録晉成帝咸和二年蘇峻舉兵于石頭陶侃溫嶠庾亮陳于白石使將軍楊謙攻于石頭峻輕騎出戰謙詐奔白石壘峻逼之才交鋒峻墜馬侃督護李陽臨陳斬峻于白石陂岸至今呼此陂為蘇峻湖在城北十五里周回十里半陽湖輿地志云江乘縣南有半陽泉半冷半熱又南徐州記云江乘縣南有半陽泉半冷半熱熱處可爛物冷處如氷熱處魚入冷處即死冷處魚入熱處亦死民種稻則溉熱水一年再熟今廢楊修有詩云江南龍節水為鄉水不絶隂又半陽一片湖光共深淺兩般泉脈異溫涼在城東北四十里周回十五里絳巖湖圗經云在句容縣西南三十里源出絳巖山周回二十里溉田一百頃舊收歲課錢二百二十貫咸平三年正月奉敕除放固城湖圗經云水路在溧水縣南九十五里東西二十五里南北三十里有四派東經五堰經常州宜興縣界入太湖丹陽湖圖經云在溧水縣西八十里與太平州當塗縣分界昔唐李太白常遊此湖酷愛其景乃張帆載酒縱意往來而作詩曰湖與元氣連風波浩難止天外賈客歸雲間片帆起龜逰蓮葉上鳥宿蘆花裏少婦棹輕舟歌聲逐流水溧陽湖圖經云在本縣西北四十里曹姥山西經溧水縣東流入縣界又南流三十里入長塘湖一名瀨水吳越春秋云伍子胥奔吳至瀨渚遇女子因跪乞食女食之授以壺漿誡曰勿言既濟女巳投水後子胥伐楚還投金于瀨水以報之須臾有嫗行哭而來曰吾女三十不嫁遇窮人食之投水而死乃取金以歸水次有碑李太白文五馬渡圗經云在縣西北二十三里幕府山之前晉元帝與彭城等五王渡江處按晉書太安之際童謡云五馬浮渡江一馬化為龍及永嘉中元帝登大位乃其符云五馬之名取此桃葉渡圗經云在縣南一里秦淮口桃葉者晉王獻之愛妾名也其妹曰桃根獻之詩曰桃葉復桃葉渡江不用楫但渡無所苦我自迎接汝不用楫者謂橫波急也嘗臨此渡歌送之楊修有詩云桃葉桃根栁岸頭獻之才調頗風流相看不語橫波急艇子翻成送莫愁麾扇渡圗經云在縣東南四里故朱雀航之左晉廣陵相陳敏反南渡江時假顧榮丹陽內史榮發舟南岸敏率衆萬餘人出不獲濟以白羽扇麾之其軍遂自潰因以為名也楊修有詩云旌旗爍日刃凝霜甲光如龍人似狼羽扇一麾風偃草䇿勳多謝顧丹陽白鷺洲圗經云在城西南八里周回十五里對江寧之新林浦唐李白詩云三山半落青天外二水中分白鷺洲長命洲梁武帝放生之所也在石頭城前帝日市鵝鴨雞豚之屬放此洲名為長命洲置戶十家常以粟穀餧飼歲各千石而為狐狸所食及掌戶竊而烹者各半輿地志魏使李恕來聘帝時於此放生問恕曰北主頗知此事乎對曰魏國不殺亦不放帝無以應之楊修詩曰梁武慈悲不鼎烹蒙恩豢養亦虛名狐狸口腹應潛飽就死多于日放生葛仙丹井仙公葛玄煉丹井也按建康實録吳大帝好道術玄嘗與遊處後玄白日升天其井尚存外有石欄相傳云南唐所造今去城四十里方山頂上是也景陽井亦名胭脂井臺城中景陽宫井也按南史隋克臺城陳後主與張麗華孔貴妃俱入井隋軍出之故杜牧之詩云三人出眢井謂此也其井有石欄上多題字舊傳云欄有石脈以帛拭之作胭脂痕或云石脈之色類胭脂故云圖經不載楊修有詩云擒虎戈矛滿六宫春花無樹不秋風倉惶益見多情處同穴甘心赴井中唐李白金陵歌曰石頭巉巖如虎踞凌波欲過滄江去鍾山龍盤走勢來秀色橫飛厯陽樹四十餘帝三百秋功名事迹隨東流白馬小兒誰家子太清之歲來關囚金陵昔時何壯哉席卷英豪天下來冠蓋散為雲霧去金輿玉座成寒灰扣劍悲吟空咄嗟梁陳白骨亂如麻天子龍沈景陽井誰歌玉樹後􅒉花此地傷心不能道目下離離長春草送爾長江萬里心他年來訪商山皓應潮井蔣山頭陀寺中塔記云梁大同元年後閣舍人石興造山頂第一峯佛殿後有一井泉與江潮盈縮增減相應楊修詩云碧甃時時減復增山頭海面密相應古來泉脈誰穿鑿潮落潮生不暫澄藏氷井覆舟山上有凌室乃六朝每歲藏氷于此也楊修詩云尤喜凌人職未隳閉藏出納示針規戰兢國步艱難者常似臨深履薄時在城東北十里六朝事迹編類卷上
