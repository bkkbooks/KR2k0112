body:
  text: 六朝事迹編類卷上宋張敦頥撰總敘門第一六朝興廢吳大帝即位在魏太和七年壬寅歲權字仲謀姓孫氏吳郡富春人堅之次子兄為吳侯將死以事授之破曹操於赤壁襲關羽於荆州黃武元年四月即位在位三十一年年七十一葬蔣陵年號黃武七黃龍三嘉禾六赤烏十三太元二會稽王即位在魏嘉平四年壬申歲權少子諱亮字子明母潘氏權薨即位至太平三年謀誅大將軍孫綝不克綝黜亮為會稽王永安三年孫休鴆殺之在位七年年號神鳳二五鳳二太平三景帝即位在魏甘露四年戊寅嵗權第六子諱休字子烈母王氏亮廢孫綝迎休即帝位綝典禁兵謀逆休因臘受賀縛而殺之永安七年七月休薨在位七年年號永安七歸命侯即位在魏咸熙二年甲申歲權廢太子和之子諱皓字元宗母何氏休薨丞相楊興大將軍張布説太后朱氏迎皓即帝位皓既得志驕淫粗暴誅興布殺景后天紀四年晉遣王濬舟師至建鄴之石頭皓降之舉家西遷晉太康元年詔賜歸命侯越五年死在位十七年年四十三年號元興一甘露寶鼎三建衡三鳳凰二天册一天璽一天紀五右吳四主共六十二年吳初都鄂後遷建業傳世四東據江南盡海置交理龍編今安南府廣理畨禺今廣州荆理南郡今江陵郢理江夏今鄂州四州有州四十二以建平歸州西陵陜州陸遜陸抗鎮守樂郡江陵松滋縣東南郡江陵巴丘嶽州魯肅孫皓鎮守夏口鄂州武昌鄂州縣皖城舒州濡須塢和州牛渚圻宣州為重鎮後得沔口邾城黃州廣陵自孫權破曹操於赤壁之後時劉璋牧益州周瑜請於權曰乞與奮威俱進取蜀而并張魯還與將軍據襄陽以蹙操北方可圖也東晉繼西晉元帝諱睿字景文姓司馬氏西晉宣帝懿之曾孫琅琊恭王覲之子母恭王妃夏侯氏妃通小吏牛氏生元帝故元石圗有牛在馬後初嗣父位永嘉初用王導計鎮建鄴西都不守承制改元稱王愍帝崩凶問至遂即位元年丁丑金德都建康帝性簡儉初拜貴人有司請市雀叉帝以煩廢不許所幸鄭夫人衣無文綵永昌元年崩在位六年年四十七葬建平陵廟號中宗年號建武一太興四永昌一明帝元帝長子諱紹字道畿母荀氏元帝貴人永昌元年閏十一月即帝位元年癸未太寧二年王敦舉兵內向帝乘巴滇多年切駿馬微行觀敦營壘敦夢日環其城驚曰此必鮮卑奴來帝狀類外氏鬚黃故云秋七月敦水陸五萬至于南岸帝擊破之敦憤惋而死三年閏八月帝崩在位三年年二十七葬武平陵年號太寧三成帝明帝長子諱衍字世根母庾氏明帝崩帝即位年五歲中書令庾亮輔政元年丙戌咸和三年蘇峻作亂遷帝于石頭陶侃攻殺峻賊黨立峻弟逸為帥滕含敗逸奉御于溫嶠舟巳而造新宫遷之咸康八年六月崩在位十七年年二十二葬興平陵年號咸和九咸康八康帝成帝母弟諱嶽字世同咸康八年六月即位元年癸卯建元三年九月崩在位三年年二十三葬崇平陵年號建元三穆帝康帝子諱聃字彭祖母褚氏康帝崩帝即位年二歲禇后臨朝元年乙巳升平五年崩在位十七年年十九葬永平陵年號永和十二升平五哀帝成帝長子諱丕字千齡所生母周氏穆帝崩帝即位元年壬戌雅好黃老辟榖餌藥遂中毒不識萬機興寧三年崩在位四年年二十五葬安平陵年號隆和一興寧二廢帝哀帝母弟諱奕字延齡哀帝崩無嗣皇太后迎帝即位元年丙寅桓溫欲立威權憚帝守道誣以牀第廢為東海王又為海西公安于屈辱太元十一年崩在位六年年四十五葬安平陵年號太和六簡文帝元帝少子諱昱字道萬所生母鄭氏廢帝廢皇太后詔統皇極咸安元年十一月即位元年卒未二年崩年五十三葬髙平陵年號咸安二孝武帝簡文帝第三子諱曜字昌明所生母李氏咸安二年即位元年癸酉帝溺於酒色長星見心甚惡之於華林舉酒曰長星勸汝一杯酒自古何嘗有萬歲天子邪初簡文帝見讖云晉祚盡昌明及李太后有身夢神人謂曰汝生男宜字昌明及産東方始明因以為名簡文後悟乃流涕時帝戲所寵張貴人以年幾三十當廢貴人潛怒向夕帝醉遂暴崩在位二十四年年三十五年號寧康三太元二十一安帝孝武帝長子諱德宗字德宗所生母陳氏武帝淑媛太元二十一年即位元年丁酉元興三年靈寶逼帝西上後復逼東下督護馮遷斬靈寶帝反正于江陵義熙十四年十二月崩在位二十二年年三十七葬休平陵初讖云昌明之後有二帝劉裕將為禪代密使王韶之縊帝而立恭帝以應二帝云年號隆安五元興三義熙十四恭帝安帝母弟諱德文安帝崩劉裕矯詔立帝元年巳未元熙二年六月禪位於裕裕以帝為零陵王居秣陵二年裕使人踰垣弒帝在位二年年三十六諡恭帝葬沖平陵年號元熙二右江左十一帝都建康共一百六年劉聰既殺愍帝元帝即位遷都建康號曰東晉傳世凡十有一爰自永嘉南渡境宇殊狹禹貢九州之地僅有其二元帝初命祖逖鎮雍丘今東京逖死北境漸蹙于是荆豫自淮北蔡潁濟等州以北青兖四州登萊密海淄齊州是及徐州之半徐沂等州陷劉曜石勒以合淝今廬州淮隂今楚州夀陽石季龍死後復之今夀州泗口在今泗州角城在泗為重鎮成帝時酇守將退屯襄陽今榖城縣穆帝時平蜀漢擒李勢復梁益之地又遣軍西伐入關至灞上討苻健再北伐一至洛陽討慕容雋破其將姚襄于伊水一至枋頭衛州所得郡縣軍旋又失去洎苻堅東平慕容暐西南陷蜀漢西克姑臧涼州則漢水長淮以北悉為堅有及堅敗再復梁益青徐兖荆河內之地其後青兖陷于慕容德荆河司陷于姚興以彭城為北境藩扞後梁益又陷于譙縱義熙初陷每因劉石苻姚衰亂之際則進兵屯戍在于漢中襄陽彭城然大抵上明今江陵松滋縣江陵夏口武昌合淝夀陽淮隂常為晉氏鎮守義熙以後又復青兖司荆河梁益之地而政移于劉氏之宋矣南朝宋繼東晉宋武帝髙祖武帝劉裕字德輿小字寄奴彭城人楚元王交二十一世孫父翹郡功曹母穆氏元熙二年十二月晉恭帝禪位帝表讓至永初元年夏六月丁卯即位改元元年庚申都建康傳世凡八帝以儉德先天下碎虎魄枕施直腳牀却入筒布用葛燈籠三年五月已亥崩于西殿在位三年年六十七葬蔣山初寧陵廟號髙祖年號永初三少帝武帝長子諱義符小字車兵母張夫人永初三年夏五月癸亥以皇太子即帝位元年癸亥景平二年夏五月巳酉皇太后令暴其過惡廢為營陽王六月癸丑徐羡之等弒帝于金昌亭在位二年年十九年號景平二文帝武帝第三子諱義隆小字車兒母胡媫妤少帝廢徐羡之等迎立元嘉元年秋八月丁酉即帝位元年甲子三十年二月甲子為元凶太子劭所弒在位三十年年四十七葬長寧陵廟號太祖年號元嘉三十孝武文帝第三子諱駿字休龍母路淑媛殺元凶劭自立元年甲午元嘉三十年四月辛酉即皇帝位于新亭帝少機穎讀書七行俱下才藻甚美大明八年夏五月庚申崩在位十一年年三十五葬秣陵巖山景寧陵廟號世祖年號孝建三大明八前廢帝孝武帝長子諱子業小字法師大明八年閏五月庚午以皇太子即帝位元年甲辰帝自以昔在東宫時不為孝武所禮及即位將掘景寧陵太史言於帝不利乃縱糞于陵肆罵孝武為齇壯加切奴又發殷貴妃墓十一月帝左右夀寂之等謀廢帝懷刀入宫弒之乃崩于華光殿在位一年年十七葬丹陽秣陵年號景和一正月乙未改永光明帝文帝第十一子諱彧字休炳母沈媫妤泰始元年冬十二月丙寅即帝位元年乙巳泰豫元年夏四月巳亥崩于景福殿在位八年年三十四五月戊寅葬臨沂縣幕府山髙寧陵廟號太宗年號泰始七泰豫一後廢帝明帝長子名昱字德融母陳氏李道兒妾人呼李氏子明帝崩以皇太子即帝位元年癸丑孝武二十八子明帝殺其十六餘皆帝殺之元徽五年七月七夕楊玉夫等入氈幄內弒帝于仁夀殿年十五葬秣陵年號元徽五順帝明帝第三子諱凖字仲謨蕭道成奉太后令迎立升明元年七月壬辰即帝位元年丁巳改元徽五年為升明元年三年四月壬辰禪位于齊齊封為汝隂王建元元年五月巳未殺之葬于遂寧陵年號升明三右劉宋八帝共六十年宋武帝北平廣固慕容超廣固今青州西定梁益譙縱又克長安姚泓盡得河南之地長安尋為赫連勃勃所陷至廢帝景和中武牢西復陷後魏今大較以孝武大明為正凡二十有二州揚理建業今建康南徐理京口今潤州丹徒縣徐理彭城今徐州南兖理廣陵今揚州兖理瑕今兖州縣南豫理厯陽今和州豫理汝南今蔡州汝陽縣江理潯陽今江州青理臨淄初理厯城復理廣固後又移理臨淄今青州縣冀理厯城今濟州縣司理義陽今信陽荆理南郡今江陵府郢理江夏今鄂州湘理臨湘今潭州雍理襄陽今襄州梁理南鄭今興元府縣秦亦理南鄭益理成都今府寧理建寧今姚州廣理南海今廣州交理龍編今安南府越理臨漳今廉州郡凡二百三十八縣千一百七十九文帝元嘉中遣將北伐水軍入河克魏碻磝滑臺今滑州武牢今河南洛陽今西京四城其後又失又分軍北伐西軍克洪農開方二城以東攻滑臺不克而平碻磝守之尋皆敗退於是後魏太武總師經彭城臨江屯於瓜步揚州退攻盱眙今楚州不拔而還明帝時後魏又南侵淮北冀徐兖四州又荆河州西境悉陷沒則長淮為北境僑徐兖於淮南淮隂立兖州淮隂今楚州鍾離立徐州鍾離今濠州立青冀二州寄理贛榆今海州東海縣其後十餘年而滅亡然初強盛也南鄭襄陽垂匏今在蔡州形若瓠垂故名彭城厯城東陽今青州益陽縣皆為宋氏藩扞南齊繼宋髙帝蕭氏諱道成字紹伯蘭陵人漢蕭何二十四世孫建元元年夏四月甲午受宋禪即帝位於南郊元年巳未都建康傳世凡七帝性簡儉後宫器物欄檻以銅為飾皆改用鐵內殿施黃紗帳宫人著紫皮履華蓋除金華瓜用鐵回釘每曰使我臨天下十年當使黃金與土同價四年三月壬戌崩于臨光殿在位四年年五十六葬于武進泰安陵廟號太祖年號建元四武帝髙帝長子諱賾字宣逺建元四年三月壬戌以皇太子即帝位元年癸亥明年正月辛亥改元永明帝性剛毅有斷政揔大體以富國為先不喜遊宴雕綺之事言常恨之未能頓遣永明十一年七月戊寅崩于延昌殿在位十一年年五十四葬景安陵廟號世祖年號永明十一廢帝鬱林王武帝孫文惠太子長子諱昭業字元尚小字法身永明十一年戊寅武帝崩以皇太孫即帝位元年甲戌帝淫亂賞賜左右動至百數十萬每見錢曰我昔思汝一箇不得今日得用汝未西昌侯鸞屢諌不聽帝欲誅鸞鸞使蕭諶等領兵入宫弒之在位一年年二十二年號隆昌一廢帝海陵王文惠太子第二子諱昭文字季尚鬱林王廢延興元年秋七月丁酉即皇帝位時宣城王鸞輔政帝起居皆咨而後行十月辛亥皇太后使宣城王入纂帝統令廢帝為海陵王建武元年冬十月鸞遣御師殞之年號延興明皇帝始安貞王子諱鸞字景棲海陵王廢太后以帝纂統建武元年十月癸亥即帝位元年乙亥永泰元年七月巳酉帝崩于正福殿在位五年年四十七年號建武四永泰一廢帝東昏侯明帝第二子諱寶卷字智藏永泰元年七月巳酉以皇太子即帝位元年巳卯帝惑于潘妃為神仙等殿極奢麗又鑿金為蓮花以帖地令潘妃行其上曰此步步生蓮花也永元三年秋七月蕭衍至南豫州帝閉宫門自守十二月王珍國張稷率兵入殿弒帝斬首送蕭衍在位三年年十九年號永元三和帝明帝第八子諱寶融字智昭中興元年三月乙已即皇帝位元年辛已二年遜位于梁梁奉帝為巴陵王宫于姑孰四月戊辰殂追尊為和帝在位二年年十五