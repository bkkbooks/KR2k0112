body:
  text: 六朝事迹編類地理類八雜記之屬提要臣等謹案六朝事迹編類二巻宋張敦頤撰敦頤字養正婺源人紹興八年進士與朱松友善由南劒州教授歴官至舒衡二州致仕所著有韓柳文音辨編年諸書尚𫝊于世是編前有紹興庚辰自序結銜稱左奉議郎充江南東路安撫司幹辦公事乃登第後之二十二年也其書葢補金陵圖經而作首總敘次形勢次城闕次樓臺次江河次山岡次宅舍次䜟記次靈異次神仙次寺院次廟宇次墳陵次碑刻凡十四門徵引頗為詳博而碑刻一門尤有資于考據惟書以六朝為名而古迹之中自南唐以逮北宋如丁謂王安石所建亦具載之殊失㫁限至總叙門内六朝保守一篇厯數自呉以來南朝不可北伐北伐必敗即倖勝亦不能守葢亦南渡之初力主和議者其識見未免卑懦然考諸事勢其説亦不為無因固與江東十鑑之虚誇形勝者較為切實矣乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀六朝事迹編類序建康禹貢揚州之域斗牛分野在周為吴在春秋末為越魯哀公二十二年越王句踐滅吴自越之後一百四十年為楚周顯王三十六年楚滅越自楚之後一百一十年為秦楚負芻五年為秦所滅乃周赧王時也初楚威王因山立號置金陵邑或云以此有王氣因埋金以鎮之或云地接金壇之陵故謂之金陵今石頭城是也及秦兼諸侯分天下為三十六郡以金陵屬鄣郡故鄣屬今吴興郡也時望氣者云五百年後金陵有天子氣始皇東巡乃鑿鍾阜斷金陵長隴以通流改其邑為秣陵縣秦秣陵縣在今府城東南六十里秣陵橋東北漢武帝元封初廢鄣郡置丹陽而秣陵縣不改初漢置揚州治無定所輿地志云先理歴陽後理夀春其後又徙曲阿漢建安十六年孫權自京口徙治秣陵明年城石頭改秣陵為建鄴晉太康初廢建鄴復為秣陵愍帝諱業即改為建康元帝即位以建康太守為丹陽尹宋齊而下咸都於此焉隋平陳廢丹陽郡乃于石城置蔣州併秣陵建康同夏三縣入江寧縣唐武徳二年為揚州東南道行臺置尚書省輔公祐據江東七年平又改為蔣州八年罷行臺稱揚州大都督府領上元金陵句容丹陽溧水等縣九年移揚州治江都改金陵為白下縣屬潤州貞觀七年復為揚州乾元元年改為昇州上元二年廢光啓三年復仍以上元句容溧水溧陽四縣𨽻之置節度使天祐四年楊行密據其地為金陵府號曰齊國封李昪為齊王以建康為西都以廣陵為東都昪僣位國號唐皇朝開寳八年復為昇州天禧二年改江寜府建炎三年改建康府此金陵郡之升降廢置之不常也余因覽圗經實錄疑所載六朝事迹尚有脱誤乃取吴志晉書及宋齊而下史傳與夫當時之碑記㕘訂而攷之分門編類綴為篇目凡十有四巻雖猥陋無益於治道然展巻則三百餘年興衰之迹若身履乎其間非徒得之于傳聞而巳同志之士盍補其所未備者而傳之紹興歳次庚辰八月左奉議郎充江南東路安撫司幹辦公事新安張敦頥序
