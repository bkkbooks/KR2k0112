body:
  text: 六朝事迹編類卷下宋張敦頥撰山岡門第六石硊山硊牛委切輿地志云秦始皇時望氣者云江東有天子氣乃東逰以厭之又鑿金陵以斷其勢今方山石硊是其所斷之地也孫盛云東至方山有直瀆自瀆至北山或云是秦時所掘山今方山西九里有大壟枕淮合壟悉是石名石硊京師溝塘纍石悉鑿此壟取之在城東南四十五里天闕山晉元帝即位起宫殿城闕郭璞云闕不便王導乃指牛頭山為天闕楊修有詩云牛頭天際碧凝嵐王導無稽示妄談若指逺山為上闕長安應合指終南鳳臺山宋元嘉中鳳凰集于是山乃築臺于山椒以旌嘉瑞在府城西南二里今保寧寺是也唐李白詩曰置酒延落景金陵鳳凰臺長波㵼萬古心與雲俱開昔時有鳯凰鳳凰為誰來鳳凰去巳久正當今日回明君越羲軒天老坐三台豪士無所用彈琴醉金罍東風吹山花安可不盡杯六帝沒幽草深宫冥緑苔置酒勿復道歌鐘但相催又詩曰鳳凰臺上鳳凰逰鳳去臺空江自流吳宫花草埋幽徑晉代衣冠成古丘三山半落青天外二水中分白鷺洲總為浮雲能蔽日長安不見使人愁宋齊邱有詩云嵯峩壓洪泉岝峪撑碧落宜哉秦始皇不驅亦不鑿上有布政臺八顧皆城郭山蹙龍虎健水黑螭蜃作白虹欲吞人赤驥相煿爍畫棟泥金碧石路盤磽確倒挂哭月猿危立思天鶴鑿池養蛟龍栽桐棲鸑鷟梁間燕教雛石罅蛇懸殼養花如養賢去草如去惡日晚嚴城鼓風來蕭寺鐸掃地驅塵埃剪蒿除鳥雀金桃帶葉摘緑李和衣嚼貞竹無盛衰媚栁先搖落塵飛景陽井草合臨春閣芙蓉如佳人回首似調謔當軒有直道無人肯駐腳夜半鼠勃窣天隂鬼敲椓松孤不易立石醜難安著自憐啄朩鳥去蠧終不錯晚風吹梧桐樹頭鳴嚗嚗峩峩江令石青苔何淡薄不話興亡事舉首思眇邈吁哉未到此褊劣同尺蠖籠鶴羡鳬毛猛虎愛蝸角一日賢太守與我觀槖籥往往獨自語天帝相唯諾風雲偶不來寰宇銷一略我欲烹長鯨四海為鼎鑊我欲取大鵬天地為矰繳音勺絲縷也安得生羽翰雉飛上寥廓其詩刻今在保寧寺覆舟山寰宇記云在城北五里周回三里髙三十一丈東接青溪北臨真武湖狀如覆舟因以為名輿地志云宋元嘉中改名真武山以其臨真武湖山復有真武觀故也晉北郊壇宋藥園壘樂逰苑氷井甘露亭皆在此山幕府山寰宇記云在城西北周回三十里髙七十丈東北臨直瀆浦西接寶林山南接蟹浦輿地志云臨沂縣東八里有幕府山寰宇記晉元帝自廣陵渡江建康城荒落以府第居縣北山下因以幕府山為名圗經云丞相王導建幕府於此山因名之山上有虎跑蒲包切蹴也泉其西巔有仙人臺宋明帝髙寧陵在山西王導溫嶠亦葬山西又按寰宇記云陳武帝破北齊軍四十六萬於幕府山下至後主禎明中嘗幸此山校獵虞世南獻賦以美之楊修有詩云六代繁華一瞬間平蕪逺樹不勝間倚樓天暝雲如幕知是琅琊幕府山雞籠山寰宇記云在城西北九里西接落星澗北臨栖玄塘輿地志云雞籠山在覆舟山之西二百餘步其狀如雞籠因以為名按南史宋文帝元嘉十五年立儒館于北郊命雷次宗居之次宗因開館于雞籠山齊髙帝嘗就次宗受禮及左氏春秋又竟陵王子良嘗移居雞籠山下集四方學士抄五經百家為四部要略千卷又按宋文帝元嘉中改為龍山以黑龍嘗見真武湖此山正臨湖上因以為名今去縣六里晉元帝明帝成帝哀帝四陵皆在山南中有佛寺五所方山寰宇記云山髙一百一十六丈周回二十七里圖經云四面方如城東南有水下注長塘流溉平陸又按輿地志云湖熟西北有方山頂正方上有池水山謙之丹陽記曰山形方如印故曰方山亦名天印山秦始皇鑿金陵此山是其斷者文選謝靈運東出鄉里相送至方山靈運嘗賦詩其略云解纜又流潮懷舊不能發又按南史宋何尚之為尚書令元嘉末致仕于方山著退居賦以明所守議者咸謂尚之不能固志後果然又按齊武帝嘗幸方山顧左右曰朕欲經始山之南復為離宫期勝新林苑徐孝嗣答曰繞黃山欵牛首乃盛漢之事今江南未廣願少留神乃止圗經謂齊武帝于方山築苑不知何所據而云攝山寰宇記云周回四十里髙一百三十二丈東連畫石山南接落星山陳江總攝山棲霞寺碑云南徐州琅琊郡江乘縣有攝山其狀似繖亦名繖山尹先生記云山多草藥可以攝養故以攝為名南史齊明僧紹住江乘攝山今棲霞寺即其宅也今去城四十五里東山上元縣有兩東山一在崇禮鄉今土山是也晉書謝安寓居會稽棲遲東山此安之舊隱也後于土山營築以擬東山今去縣二十里一在鍾山鄉蔣廟東北宋劉勔隱居之地南史勔嘗經始鍾嶺以為棲息及造園宅名為東山今去縣十五里陳軒金陵集載李白李建勳東山詩皆指土山而作白下圗經云舊屬江乘縣周回八里髙八十丈東接竹堂山南接蔣山北連攝山西有水下注平陸輿地志云階礎碑石悉出此山南史梁散騎常侍韋載有田十餘頃在江乘縣之白山天嘉元年遂築室而居屏絶人事不出籬門者十載今去縣二十里濁山圗經云在溧陽縣東南十里髙一十丈周回五里山北濁水出焉輿地志云溧陽縣有濁山下有濁水即秦淮之源也湯山寰宇記云在縣東北其西接雲穴山山不甚髙無大林朩有湯泉出其下大小凡六處湯澗繞其東南四時常熱禽鳥之類入之輒爛以煮豆穀終日不熟草朩濯之轉見鮮茂舊有湯泉館今廢去縣五十里大壯觀山圗經云在城北一十八里周回五里髙二十丈東連蔣山西有水下注平陸南臨真武湖北臨蠡湖舊經謂陳宣帝起大壯觀於此山因以為名南史宣帝大建十一年八月幸大壯觀因大閲武命都督任忠領步騎十萬陳于真武湖上登真武門觀宴羣臣因幸樂逰苑設絲竹之會仍重幸大壯觀振旅而還臨沂山圗經云在城東北四十里周回三十里髙四十丈東北接落星山西臨大江西南有舊沂縣城祈澤山舊經云初法師嘗結茅于此有龍女來聽講既而神泉涌于講座下後遂為祈禱水旱之所山因此得名髙五十丈周回十里東連彭城山北連青龍山今去縣二十三里東廬山圗經云在溧陽縣東南一十五里髙六十八丈周回二十里有三源一出山西流入秦淮一出山東北流入馬沈港一出山東南吳漕流入丹陽湖丹陽記云溧陽縣東有廬山與丹陽分界俗傳云以廬舍為名又云嚴子陵嘗結廬于此盧龍山圗經云在城西北十六里周回五里髙三十六丈東有水下注平陸西臨大江舊經云晉元帝初渡江到此見山嶺連綿接石頭城真江上之關塞以此地近盧龍因以為名馬鞍山圗經云以形似得名西臨大江東與石頭城相接南史陳後主禎明三年隋將濟宜黃侯慧紀自荆州帥將士沿江而下欲趍臺城遣南康太守魯肅將兵以鐵鎖橫江隋將楊素奮兵擊之爭馬鞍山四十餘戰隋軍死者五千餘人今去城十里大巫山圗經云在溧陽縣北四十五里周回二百五十步髙八丈長塘湖內接鎮江府金壇縣界小巫山圗經云在溧陽縣東北二十五里周回四里髙五丈長塘湖內石上有獸迹平陵山圗經云在溧陽縣西北三十五里髙三丈周回三里晉書云永和三年李閎斬韓晃蘇逸于此鐵冶山圗經云在溧陽縣西南七十里周回二十里髙一百八十丈輿地志云前代鐵冶山絳巖山圗經云在句容縣西南三十里周回二十四里髙一百六十五丈上有龍坑祠壇江南地志云漢丹陽縣北有赭山其土亦赤因為郡名本名赤山唐天寶六年改名絳巖山竹里山圗經云在句容縣方輿地記云行者以其途傾險號曰翻山峴鮑昭有行翻車峴詩即此山也大城山圖經云周回二十二里髙八十二丈南接苻堅山西接鴈門山北接竹堂山今去城七十里望祭山東晉成帝於北郊以白山鍾山配四十四神之數兼祭之按通典梁武帝省四望座惟鍾山及松江浙江五湖白石山並存之白土岡圗經云北連蔣山其土色白因名之輿地志云同夏縣西有白土壟即此地按北史隋賀若弼嘗破陳軍於蔣山之白土岡今蔣山西北有岡壠土色正白乃其地圗經云在縣東二十二里非是蓋同夏縣在今縣東十五里而白土岡在同夏之西不應有二十二里之逺也白楊路圖經云縣南十二里石山岡之橫道是也六朝雜事云宋袁粲常酌于此忽逢村父便留連笑語人怪而問之答曰吾侣偶逢非知音也楊修有詩云殘枝敗葉幾霑春莫問栽培迹巳陳細雨斜風馬無力蕭蕭滿路更愁人千佛嶺在攝山栖霞寺之側按江總栖霞寺碑明僧紹居士子仲璋為臨沂令於西峯石壁與度禪師鑄造無量夀佛大同二年龕頂放光齊文惠太子豫章文獻王竟陵文宣始安王及宋江夏王霍姬齊田奐等琢石建像梁臨川靖惠王復加瑩飾嶺之中道石壁有沈傳師徐鉉張稚圭王雱題名謝安墩在半山報寧寺之後基址尚存謝安與王羲之嘗登此超然有髙世之志李太白將營園其上乃作詩曰晉室昔橫潰永嘉遂南奔沙塵何茫茫龍虎鬭朝昏胡馬風漢草天驕蹙中原哲匠感頽運雲屏忽飛翻組練照楚國旌旗連海門西秦百萬衆戈甲如雲屯投鞭可填江一掃不足論皇運有返正醜虜無遺魂談笑遏橫流蒼生望斯存冶城訪古迹猶有謝安墩憑覽周地險髙標絶人喧想像東山姿緬懷右軍言梧桐識佳樹蕙草留芳根地古雲物在臺荒禾黍繁我來酌清波于此樹名園功成拂衣去歸入武陵源王荆公詩云我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公桃花塢在蔣山寶公塔之西北舊有桃花甚盛今不復存方山埭建康實録吳赤烏八年使校尉陳勳發屯田兵于方山南截淮立埭號方山埭又按南史湖熟縣方山埭髙峻冬月行旅以為難齊明帝使沈瑀修之瑀乃開四洪斷行客就作三日便辦其埭今去城四十五里雞鳴埭建康實録青溪有橋名募士橋橋西南過溝有埭名雞鳴埭齊武帝早逰鍾山射雉至此雞始鳴圖經云今在青溪西南潮溝之上又按南史齊武帝永明中散逰幸諸苑載宫人從車至內深隱不聞端門鼓漏聲置鍾景陽樓上應聞鍾聲並早起粧飾帝數幸琅琊城宫人常從早發至湖北埭雞始鳴故呼為雞鳴埭若爾其埭又當近北父老傳曰今清化市真武廟側是其處也二埭恐皆當時所歷姑兩存之鑄劍坑圖經云在溧陽縣南八十里石屋山之西舊經云昔吳王使歐冶子鑄劍于此射雉場圖經云在縣東二十里齊東昏侯置射雉場五百所皆以七寶裝翳楊修有詩曰外作禽荒內色荒三千紅粉日嚴粧潘妃縱有嫣然態不步金蓮到射場絶地圖經云在縣南三里古大社西有凶地三畝晉周顗司馬秀蘇峻皆宅于此悉以禍敗宋王僧綽曰大丈夫當以正道自居何宅之有凶吉尋為元凶所害楊修有詩曰四主衣冠今不終髙門列戟謾重重由來瘠沃分勞逸莫道人凶非宅凶宅舍門第七孔子巷輿地志云孔子廟在樂逰苑東隔青溪本聖亭侯所奉之廟也舊在溪南丹陽郡之東南本東晉所立中廢宋元嘉十九年詔復孔子廟至齊遷于今處以舊地為浮圗今名孔子寺亦名孔子巷在城東南五里古長樂橋東言偃里史記孔子弟子列傳言偃字子遊吳人今不知其里所在或云在城東二十二里四學南史宋文帝元嘉十六年立儒學館于雞籠山命雷次宗居之因集丹陽何尚之立玄素學著作佐郎何承天立史學司徒參軍謝玄立文學各聚門徒多就業者江左風俗於斯美焉陸機宅建康實録云陸機入洛作懷舊居賦云望東城之紆徐邈吾廬之延佇李太白題王處士水亭云齊朝南苑是陸機宅其詩云王子耽玄言賢豪多在門好鵝尋道士愛竹嘯名園樹色老荒苑池光蕩華軒北堂見明月更憶陸平原掃地青玉簟為余置金樽醉罷欲歸去花枝宿鳥喧何時復來此再得洗囂煩圖經云在縣南五里秦淮之側江令宅陳尚書令江總宅也建康實録及楊修詩注云南朝鼎族多夾青溪江令宅尤占勝地後主嘗幸其宅呼為狎客劉禹鍚詩云南朝詞臣壯朝客歸來唯見秦淮碧池臺竹樹三畝餘至今人道江家宅今城東段大夫約之宅正臨青溪即其地也故王荆公詩云昔時江令宅今日段侯家此可驗也沈約宅南史梁沈約遷尚書令雖名位隆重而居處儉素立宅東田矚望郊阜嘗為郊居賦以敘其事東田在鍾山之下也孫瑒宅建康實録陳起兵部尚書孫瑒居處奢豪宅在青溪東西即江總宅瑒家庭穿築極林泉之致歌童舞女當世罕儔劉子圭宅南史齊劉瓛字子圭居于檀橋瓦屋數間上皆穿漏永平七年竟陵王子良表武帝為立館帝以揚烈橋故主地給之檀橋在今縣東二十五里青龍山之前朱異宅南史梁朱異及諸子自潮溝列宅至青溪其中有臺池玩好每暇日與賔客逰焉諸葛恪宅圖經云在縣東二里古元風觀前南接青溪里俗傳云在今縣東南百餘步面對青溪其東即江令宅也宋齊邱宅舊傳在鎮淮橋之北御街之東今南北較務是也其後又為南唐國子監杜姥宅建康實録晉成帝恭皇后杜氏母裴氏即杜𢎞治之妻也裴氏名穆孝武帝封為廣德君初穆渡江宅於南掖門外時裴氏夀考故呼為杜姥圗經云在舊縣東北三里舊縣在冶城今天慶觀之東是也其宅未詳所在烏衣巷王榭金陵人世以航海為業一日海中失船泛一朩登岸見一翁一嫗皆衣皂引榭至所居乃烏衣國也以女妻之既久榭思歸復乘雲軒泛海至其家有二燕棲于梁上榭以手招之即飛來臂上取片紙書小詩繫于燕尾曰誤到華胥國裡來玉人終日苦憐才雲軒飄出無消息灑淚臨風幾百回來春燕又飛來榭身上有詩云昔日相逢冥數合如今睽逺是生離來春縱有相思字三月天南無鴈飛至今歲竟不至因目榭所居為烏衣巷劉禹錫有詩曰朱雀橋邊野草花烏衣巷口夕陽斜舊時王榭堂前燕飛入尋常百姓家此見托遺圗經云在縣東南四里晉書王導紀瞻宅皆在此巷乘黃署輿地志云在東府之西北五輅及朝軍凡駕馬者之所去縣東北六里紙官署輿地志云宋永初中立舊日齊帝于此造銀光紙以賜王僧虔在縣東一十五里扶南樂署建康實録吳赤烏七年扶南國獻樂人于此置舍以教宮人在縣北二里銅螭署臺城刻漏署西本洛陽之舊物宋平姚秦遷于此魏明帝為太子時玩以玉手扳刺螭口中因入不出後人常見白蝘蜓在其中梁元帝移之江陵此物後遂不復見楊修詩云挈壺傳箭逼天聰鑄出蟠螭巧範同何事腹中藏怪物人驚蝘蜓氣如虹錦署圗經云在縣東南十里宋遷百工于此也楊修詩云人衣繿縷地衣紅不念家家杼軸空厥篚織文應歲貢更翻新樣集機工焚衣街齊東昏侯自製服為四種冠五彩袍一月中二十餘出辰出三更歸夜出清晨返梁自襄陽出師廢之焚奢淫服六十二種於御街中楊修詩云雉頭金縷又珠胎煙緒香雲晝不開御路傍人皆嘆息逡巡紅焰作青灰讖記門第八秦淮石志保太中浚秦淮得石志按其刻有大宋乾德四年凡六字他字磨滅不可識令諸儒參驗乃輔公祏反江東時年號太祖受命國號宋改元乾德江左始衰弱豈非威令將及而符讖先著也石印天璽元年歷陽山石文理成字凡二十云楚九州渚吳九州都揚州士作天子四世治太平始江表傳云歷陽縣有石山臨水髙百丈其三十丈所有七穿駢羅穿中色黃赤不與本體相似俗相傳謂之石印又云石印封發天下當太平下有祠屋巫祝言石印神有三郎時歷陽長表上言石印發皓遣使以太牢祭歷山巫言石印神三郎説天下方太平使者作髙梯上看印文詐以朱書石作二十字還以啓皓皓大喜曰吳當為九州作都渚乎從大皇帝逮孤四世矣太平之主非孤復誰重遣使以印綬拜三郎為王又刻石立銘褒讃靈德以答休祥此見吳志注石室吳興陽羡山有空石長十餘丈名曰石室在所表為大瑞皓乃遣司徒董朝太常周處至陽羡縣封禪國山明年改元天紀大赦以協石文三斷石吳後主天册元年掘地得銀長一尺廣三分刻上有年月字又於吳郡臨平湖邊得一石函中有一小石青白色長四寸廣二寸刻上作皇帝字于是改元天璽遂立石紀吳功德按實録云縣南三十里西接牛頭山丹陽雲巖東路有大碣石長二丈折為三斷此紀功之碑也今移在府治中可辨者二百餘字漫滅者五十餘字楊修詩曰孫吳紀德舊刋碑埋沒蟠螭與伏龜惆悵石岡三斷在至今猶似鼎分時寶公銅牌記按髙僧傳公諱寶志宋元嘉中現形于東陽鎮古朩鷹巢中朱氏聞巢中兒啼遂收育之因以朱為姓施宅為寺公自少出家依於鍾山道林有銅牌記多讖未來事云有一真人在冀州開口張弓在左邊子子孫孫萬萬年江南中主名其子曰𢎞冀吳越錢鏐諸子亦皆連𢎞字以應之而國朝宣祖諱乃正當之潛鶴鼓臺城端門上二鼓初得于會稽雷門傳是越王舊物擊之聲聞洛陽後孫恩亂兵擊破中有二鶴沖天而去自是不復鳴後人呼為潛鶴鼓楊修有詩云端門擊破使人驚潛鶴雙飛上玉清怪得舊時聲太逺沖天合自九臯鳴天水碧南唐末時前數年宫人挼薔薇水染生帛一夕忘收為濃露所潰色倍鮮翠因令染坊染必經宿露之號為天水碧宫中競服之識者以為天水趙之望也獨足臺陳末時有一鳥獨足飛上宫城臺上以觜畫地云獨足上髙臺盛草化為灰欲知我家處朱門當水開解者以為獨足指後主獨行無衆盛草言荒穢隋承火運草得火而灰及國破隋煬帝館于都水臺所謂上髙臺當水開也楊修詩云鳥迹分明在帝臺管絃聲裡輒書來回頭一覺風流夢猶得朱門傍水開靈異門第九八功德水蔣山悟真菴後按梅摯亭記梁天監中有胡僧曇隱寓錫于此山中乏水時有龎眉叟相謂曰豫山龍也知師渴飲措之無難俄而一沼沸成後有西僧繼至云本域八池巳失其一似竭彼盈此也其泉一清二冷三香四柔五甘六淨七不饐八蠲疴故名八功德水自梁巳前嘗取給御厨又按楊修詩注云髙僧曇隱逰行于此忽聞金石絲竹之音俄見清泉一泓瑩徹甘滑有積年疾者飲之皆愈志公鱠殘魚髙僧傳寶志嘗對梁武帝食鱠帝曰朕不知味二十餘年師何為爾志乃吐出小魚鱗尾依然今金陵尚有鱠殘魚牝狙觸網按湘山野録云南唐李後主獵青龍山一牝狙觸網見主雨淚稽顙屢指其腹主戒虞人保守之是夕誕二子還幸大理寺親録囚繫一大辟婦以孕在獄未幾誕二子煜感牝狙之事罪止于流其山去城東二十五里感龍産鯉昔民有女感黑龍于田野歸而有娠後産鯉魚投于水中復能變化隨母所出入後成龍而去母亡每春時必來墳所鄉人懼之因立廟祠焉謂之烏鯉廟在溧水縣東南二十五里郗氏化蛇郗氏梁武帝皇后也崩數月帝常追悼之晝則忽忽不樂宵乃耿耿不寐居寢殿聞外騷窣蘇骨切勃窣穴中出也聲視之乃見一蟒盤躃上殿睒式冉切説文云暫視貌晴呀香牙切張口貌口以向於帝帝大驚駭無所逃遁不得已蹶然而起謂蛇曰朕宫殿嚴警非爾蛇類所生之處必其妖孽欲祟朕邪蛇為人語啓帝曰蟒則昔之郗氏也妾以生存嫉妬六宫其性慘毒怒一發則火熾矢射損物害人死以是罪謫為蟒耳無飲食可實口無窟穴可庇身飢窘困迫力不自勝又鱗甲有蟲唼子合切嚙五狡切肌肉痛苦甚劇若加錐刀焉蟒非常蛇亦復變化而至不以皇居深重為阻耳感帝平昔眷妾之厚故託醜形骸陳露于帝祈一功德以見拯拔也帝聞之嗚呼感激既而求蟒遂不復見帝明日大集沙門於殿庭宣其由問善之最以贖其苦志公對曰非禮佛懺滌悃欵不可帝乃然其言搜索佛經録其名號兼親抒睿思灑聖翰撰悔文共成十卷皆採托佛語削去間詞為其懺禮又一日聞宫室內異香馥郁良久轉美初不知所來帝因仰視乃見一天人容儀端麗謂帝曰此則蟒後身也蒙帝功德巳得生忉利今呈本身以為明驗也殷勤致謝言訖而去此見梁武懺序燕雀湖輿地志云走馬橋見有燕雀湖窮神祕苑曰梁昭明太子在東宫有一琉璃碗紫玉杯皆武帝所賜也既薨詔置梓宫後更葬開墳為閹人攜入大航乃有燕雀數萬擊之因為有司所縛乃獲二寶器帝聞而驚異詔以賜太孫封墳之際復有燕雀數萬銜土以增其上墳側今有湖後人因名燕雀湖楊修有詩曰平湖岸側見髙墳萬土銜來燕雀羣鑑面無波天一色此中文藻似儲君在城東四里下入青溪新洲南史宋武帝伐荻新洲見大蛇長數丈射之傷明日復至洲裡聞有杵臼聲往覘之童子數人皆新衣于樁中搗藥問其故答曰王為劉寄奴所射合散傅之帝曰王神何不殺之答曰寄奴王者不可殺帝叱之皆散收藥而反今薛家洲蓋其地也屬金陵鄊去城北四十里生人參南史梁阮孝緒字士宗母王氏有疾合藥須得生人參舊傳鍾山所出孝緒躬歷幽險纍日不逢忽一鹿前行隨後至一所遂滅就視其處果獲此草今山中不復有之木醴建康實録陳後主禎明二年初覆舟山及松柏林冬月出木醴後主以為甘露之瑞俗呼為雀餳今廢也神仙門第十茅君山茅濛字初成華陽人也隱華山修道秦始皇三十一年白日上升是時先有民謡曰神仙得者茅初成駕龍上升入太清時下玄洲戲赤城繼世而往在我盈始皇聞之問故老曰此仙謡也於是有尋仙之意濛之元孫盈得道于金陵句曲山上升為東嶽上卿司命真君太元真人居赤城時來句曲郡人改句曲為茅君山事見托遺圖經云漢時有三茅君各乘一白鶴來居其上故號為三茅君世傳茅盈茅固茅震皆濛之後也山在句容縣東南四十五里華山華陽皆在句容縣荆公有詩云一峯髙出衆山巔疑隔塵沙道里千俯視煙雲來不極仰攀蘿蔦去無前人間巳換嘉平帝地下誰通句曲天陳迹是非分草莽紛紛流俗尚神仙仙人臺幕府山之西有石棊盤説者云舊有仙人對奕于此故徐君平幕府山詩云仙去棊枰草自繁即此地也去城北二十五里尋仙觀梁時造也與芝山燕洞相鄰上有石壇舊經云昔茅君行道之所唐垂拱五年道士宋文幹因石琢像重修壇焉在溧水縣東南六十里太虛觀舊經云東晉時李盤白遇仙於此修道白日上升山頂有會仙亭唐開元五年建大中祥符元年九月奉敇改今額在溧陽縣西南四十里盤白山下初名招仙觀華陽洞舊經云即第八金壇大洞天也唐改為太平觀在句容縣東南四十里茅山之側華陽宫舊經云張真人煉丹之所也梁朝陶隱居立為華陽上館唐天寶七年改今額燕洞宫舊經云梁普通三年晉陵縣女子錢妙真幼年于此修行誦黃庭經積功三十年道成佩白練飛入洞中有石室醮壇存焉天寶七年奉敕于錢真人升仙之所建宫度女道士洞在宫東一百餘步太平觀梁書云陶𢎞景讀書萬餘卷善琴棊為諸王侍讀永明十年脫朝服挂神武門上表辭祿詔許之於是止于句容之句曲山曰此是第八洞宫之名金壇華陽之天乃立館自號華陽陶隱居唐貞觀九年為升真先生改為太平觀青玄觀舊經云本吳朝葛仙公宅也梁天監七年建有一丹井在祠宇前去句容縣西南三百餘步洞玄觀輿地志云赤烏二年吳大帝為仙公葛玄造玄後白日上升山上至今猶有壇宇楊修有詩曰葛玄功行滿三千白日驂鸞上碧天留得舊時壇宇在後人方信有神仙觀在方山下去城四十五里仙杏山舊經云絶頂有杏林及仙人腳迹因以名之又有仙壇石井故一名仙壇石山唐垂拱五年重修壇三所并石井聖歷二年縣令岑仲琢石為像設香燈供祀之下有清泉流入丹陽湖在溧水縣東南四十三里白都山昔白仲都常於此學道白日上升因以為名楊修詩云駕鶴驂鸞自古聞策名仙籍是真君天邊舊迹無尋處滿目青山空白雲在城南八里西臨大江石城洞石頭城西嶺下南臨大江有洞宛然按真語云此小有洞之南門也道士塢蔣山明慶寺前乃陳宣帝禮元靖先生臧兢處今在寶公塔之東靜壇舊經云宋侍中周捨立與道士塢相對帝問曰其壇如何對曰風不鳴條雲無膚寸鹿巾黃帔其數甚多白簡朱衣其來罕至因名曰靜壇今按道士塢在蔣山古明慶寺前與八功德水相近則靜壇當在其處春澗鍾山宋興寺東梁處士劉許字彥度隱居之所楊修詩云手拖葛屨坐藜牀竹樹蕭然一水傍枕上白雲船下月卜鄰東澗勝東岡玉晨觀句容縣東南四十五里句曲洞北門之側舊經本晉許長史宅也昔髙辛時展上公秦時巴陵侯後漢時杜廣平並於此學道得仙梁武帝天監十三年陶𢎞景奏請立為朱陽館唐貞觀中為紫微國師王先生改為華陽宫天寶七年為玄靖先生改紫陽觀前有郭真人養龍池醮壇丹井俱在大中祥符中奉敕改今額寺院門第十一吳建初寺輿地志云吳赤烏十年沙門僧會自西竺來傳佛法吳大帝作寺自此起楊修有詩曰僧會西來始布金常聞鐘磬伴潮音江南古寺知多少此寺獨應年最深舊傳在城南二百餘步同泰寺梁武帝改年號大同起同泰寺在臺城內窮竭帑藏造大佛閣七層為火所焚梁帝捨身施財以祈佛福自大通以後無年不幸同泰寺設四部無遮大會俄而侯景兵起陷城遂以虛器進膳自庚辰至丙戌七日不食而崩楊修詩曰佛事莊嚴國力疲照天金碧倚欄危沈檀爐上煙雲合恰似當年煨燼時蔣山太平興國禪寺梁武帝天監十三年以錢二十萬易定林寺前岡獨龍阜以葬志公永定公主以湯沐之資造浮圖五級於其上十四年即塔前建開善寺今寺即其地也唐乾符中改為寶公院南唐升元中徐德裕重修開寶三年後主改為開善道場太平興國五年改賜今額慶歷二年府尹葉龍圗清臣奏請為十方禪院按髙僧傳及寶公實録公諱寶志宋元嘉中現於東陽郡古朩鷹巢中朱氏婦聞巢中兒啼遂收育之因以朱為姓乃施宅為寺焉公自少出家依于鍾山道林寺常持一錫杖杖懸刀尺及鏡拂之類由是知名齊梁間死而將葬梁武帝命陸倕製銘葬已賜玻璃珠以飾塔表南唐保大七年加號妙覺塔名應世本朝太平興國七年舒民柯萼遇老僧往萬歲山指古松下掘之得石篆乃寶公記聖祚綿逺之文於是遣使致謝諡曰寶公妙覺治平初更諡道林真覺大師按建康實録開善寺有志公履唐神龍初鄭克俊取之以歸長安今洗鉢池尚在塔西二里法雲寺基方池是也寺西有曰道光泉以僧道光穿斸竹足切斫也得名曰宋熙泉以近宋熙寺基之側有八功德水在寺東悟真菴之後一云泉在寺北髙峯絶頂寺東山巔有定心石下臨峭壁寺西百餘步有白蓮菴菴前有白蓮池乃策禪師退居之所寺後向東有塔曰婁約即慧約婁禪師之塔髙僧傳曰葬于獨龍山寶公之左是也舊有寶公及婁約塔碑梁王筠撰文今不復存楊次公詩曰今古忙忙利祿間幾人能此叩松關猿驚鶴怨不知處虎踞龍盤空見山芳草路隨流水逺老僧心共白雲間淮南舊隱拋離久一誦移文一愧顔荆公詩巳見鍾阜下半山報寧禪寺王荆公故宅也其地名白塘舊以地卑積水為患自荆公卜居乃鑿渠決水以通城河元豐七年公以病聞神廟遣國醫診視既愈乃請以宅為寺因賜額報寧禪寺寺後有謝安墩其西有土山曰培塿乃荆公決渠積土之地由城東門至蔣山此半道也故今亦名半山寺陳軒金陵集載荆公半山詩凡十五首寺中有寶禪師語録序王斿撰米芾書清涼廣惠禪寺偽吳順義中徐溫建為興教寺南唐升元初改石頭清涼禪寺後主復改清涼大道場本朝太平興國五年閏三月改為今額舊傳嘗為李氏避暑宫寺中有德慶堂今法堂前舊基是也後主嘗留宿寺中故其詩有未能歸去宿龍宫之句德慶堂名乃後主親書祭悟空禪師乃後主自為文碑刻今見在舊有李氏宫人親寫藏經及本朝所賜御書今皆不存唐溫庭筠清涼寺詩曰詩閣小窗藏雪嶺禪堂秋水接藍溪東坡先生捨彌陀畫像于寺中其詩曰問禪不契前三語施佛空留丈六身蓋謂此也楊次公題清涼寺翠微亭詩曰君勿愛清涼清涼如火如沸湯君勿惡炎熱炎熱如氷如積雪勿愛亦勿惡未是逍遙處君不見海會山前一條路一車來一車去今古轉轅何日住落花時節雨初晴黃鶯枝上分明語又因舟次秦淮寄清涼老曰雲居一衆舟次秦淮忽爾狂風動地白浪滔天致此片帆難以寸進又恐是石頭老子把定要津不肯放過今者食時巳及香積未充更不敢遣化菩薩去午煩若是靈利人必巳會得了也時王荆公在清涼寺見之云清涼應是推辭不得升元寺亦名瓦棺寺升元寺即瓦棺寺也在城西隅瞰江面後踞崇岡最為古迹纍經兵火略無倣佛李主時升元閣猶在乃梁朝故物髙二百四十尺太白詩所謂日月隱簷楹是也此見雜説今西南隅戒壇乃是故基南唐將歸我宋數年前升元寺殿基掘得石記乃詩讖其辭曰若問江南事江南事不憑抱雞升寶位謂李煜丁酉年生也走犬出金陵謂王師甲戌渡江也子建居南極曹彬列桷城南乃子建也安仁秉夜燈謂潘美恐有伏兵命縱火也東陵驕小女騎虎渡河氷錢俶以戊寅年入朝盡獻浙西之地騎虎之謂也瓦棺寺之名起自西晉長興年中長沙城阿陸地生青蓮兩朵民間聞之官司掘得一瓦棺開見一僧形貌儼然其花從舌根頂顱生出詢及父老曰昔有一僧不説姓名平生誦法華經萬餘部臨死遺言曰以瓦棺葬之此地所司具奏朝廷乃賜建蓮花寺五代兵火焚之李太白登瓦棺閣極眺金陵城云鍾山對北户淮水入南榮漫漫雨花落嘈嘈天樂鳴兩廊振法鼓四角吟風筝香出霄漢上仰攀日月行山空霸氣滅地古寒隂生寥廓雲漢晚蒼茫宫觀平門餘閶闔寺樓識鳳凰名雷作百山動神扶萬栱傾靈光何足貴長此鎮吳京大愛敬寺梁武帝普通元年造在蔣山之北髙峯上唐乾符間重修廣明元年改為廣明愛敬禪院南唐改廣孝禪院本朝開寶七年移額入城中今夀寧寺是也李建勳愛敬寺詩其略云雲散經窗濕山晴石路香法寶寺亦名臺城寺梁同泰寺基之半也建康實録梁武帝大通元年創同泰寺寺處宫後别開一門名大通門對寺之南門取反語以協同泰為名也帝晨夕講議多逰此門偽吳順義二年置為臺城千福院本朝改賜今額寺前有醜石四各髙丈餘俗呼為三品石政和間取歸京師其寺今在城北法光寺今名鹿苑寺即梁之蕭帝寺舊傳天監十三年造元絳寺記云不知從昔之名故後人以帝氏目之南唐保大間重建後主易名曰法光寺有子隱堂郗氏窟今𨽻祥鸞坊本朝敕改鹿苑寺棲霞禪寺攝山齊明僧紹故宅也按棲霞寺江總碑云齊居士平原明僧紹宋泰始中逰此山乃刋朩結茅二十許年有法度禪師與僧紹甚善僧紹遂捨宅成此寺蓋齊永明七年正月三日也唐髙宗嘗建寺碑并書寺額武宗會昌中廢宣宗大中五年重建本朝太平興國五年改為普雲寺景德五年改賜景德棲霞禪寺寺有舍利塔乃隋文帝葬舍利處南唐髙越林仁肇建塔徐鉉書額曰妙因寺左有千佛嶺乃明僧紹子仲璋創造齊文惠太子同僧琢梁臨川靖惠王采飾寺後有天開巖碧蘚亭白雲菴迎賢石醒石中峯澗石房白雲泉亦名品外泉寺前有明僧紹髙越墓菩提王廟菩提王即攝山靳神也廟舊居山前今移置寺左仁廟朝嘗賜金寶方牌熙寧間取寄華藏寺中石佛額有玻璃珠後墜地因置閣盛之大觀中為權要取去米芾嘗作詩紀其事寺今有唐髙宗陳尚書令江總碑沈傳師齊疏及沈傳師徐鉉題名按陳軒金陵集劉長卿顧况李紳皮日休韓熙載徐鉉徐鍇栁琰權德輿皆有詩德輿詩其略云縈紆松路深繚繞雲山曲重樓回朩杪古像鑿巖腹皆寺中景也今去城四十五里祈澤寺寺記云宋少帝景平元年建去府城二十里梁朝置龍堂有初法師者來結茅菴於山下日夜誦法華經有一女郎來聽移時方去師訝之因問其住止女曰兒東海龍女逰江淮間聞師誦經來聽之師曰此山乏水汝能神變為我開一泉可乎女曰此固易事容兒歸白父言訖不見數日後忽作風雷良久有清泉涌于座中南唐保大中以久旱祈雨于舊寺基信宿而雨作自後以為祈禱之所本朝治平改賜祈澤治平寺許堅嘗有二詩其後王荆公題云髙人遺迹空佳句誰識旌陽後世孫鐵索寺本東晉尼寺也尚書仲杲女見釋書有比丘尼問講師師曰女子削髮出家為比丘尼後因鐵索羅國尼至遂就此建寺尼以鐵索羅為名中國尼自此始明慶寺蔣山上明慶寺後别有小嶺碧石青林幽邃如畫世人呼為屏風嶺有髙僧隱于此忽聞絲竹之音俄而有清泉一派瑩徹甘滑有積年疾者服之愈梁巳前嘗取給御厨水俗呼為八功德水楊修有詩云翠壁如屏旱不枯一泓甘滑飲醍醐髙僧到此聞絲竹還有金鱗對躍無佛窟寺城南二十里牛頭山下有深坑言是辟支佛窟寺記本沙門道慶禪房梁天監中司空徐慶造寺因名曰佛窟楊修有詩云曩事何人為證明白雲深鎖翠微坑巳聞過去辟支佛未見如來彌勒生普濟寺舊名頭陀寺梁頭陀寺也建康實録梁武帝大同元年置頭陀寺記舍人石興造寺在蔣山頂第一峯後移置山下本朝治平中改賜今額殿後有應潮井其水與江潮相應及有梁昭明太子讀書臺在其西即普通元年所置大愛敬寺基也淨妙寺舊名齊安寺南唐升元中建額曰齊安本朝政和五年正月改賜淨妙舊臨官路今移置髙隴面秦淮王荆公齊安寺詩刻云日靜山如染風暄草欲薰梅殘數點雪麥漲一溪雲去城四里寶林寺舊經云本同行寺梁天監中武帝與寶公同逰此山見林巒殊勝命建精藍因以同行為額亦名聖逰寺唐會昌中廢偽吳太和中復建後改為秀峯院南唐保大九年重修本朝嘉祐中改賜今額有琪樹在法堂前梅摰詩其略云影借金田潤香隨璧月流逺疑元帝植近想志公逰建炎間樹為兵火所焚今寺屬寶林山寶乘院亦名草堂齊草堂寺也寺乃齊周顒隱居之所顒後出仕孔稚圭作北山移文以譏之髙僧傳云時有釋慧約姓婁少達妙理顒素所欽服乃于鍾山舊館造草堂寺以居之今寺左乃婁約置臺講經文之地寺後即顒舊居也王荆公草堂寺詩云周顒宅作阿蘭若婁約身歸窣堵坡唐會昌中寺廢本朝復建治平間改賜今額𨽻鍾山鄉去城十一里聖湯延祥寺𨽻湯山下舊有湯泉十所今存者六唐德宗時韓晉公滉為浙江觀察使滉小女有惡疾浴於湯應時而愈乃以女妝奩建精舍于湯山之右且求僧以主寺事時得竹林寺一市蠱毒藥僧逺近賴之多獲全濟故其藥至今以溫湯為名按唐書滉觀察浙江在貞元以前寺之建當在建中興元間而圗經乃云咸通十二年韓公置精剎咸通蓋懿宗年號是時晉公巳亡也景德寺偽吳始名崇孝寺本朝景德中改賜今額建炎元年以其地改充太廟今𨽻嘉瑞坊長干寺今名天禧寺丹陽記大長干寺道西有張子布宅在淮水南對瓦棺寺南張侯橋也長干是秣陵縣東里巷名江東謂山隴之間曰干建康南五里有山岡其間平地庶民雜居有大長干小長干東長干並是地名小長干在瓦棺寺南巷西頭出大江梁初起長干寺按塔記在秣陵縣東今天禧寺乃大長干也昔有并州胡薩訶死經七日更生云見觀音教曰洛下丹陽會稽有阿育王塔可悉禮拜之荆公有詩云梵館清間側布金小塘回曲翠文深柳條不似千絲直荷葉相依萬蓋隂淡淡岑雲相上下翩翩沙鳥自浮沈羈人樂此忘歸意忍向西風學舊吟能仁寺南唐古寺基也保大年中升州特進守司徒致仕鍾山公李建勳嘗捨莊田入寺後廢本朝撥賜地基起興慈禪院咸平初李建勳女潤州本起寺住持臨壇精律大德尼進暉申明乞以故父李相公舊所施莊田入興慈寺至今供常住也咸平後改承天寺崇寧間又改天下承天為能仁寺真宗皇帝賜升州法主圎覺大師賜紫德明七言二韻詩一首詩曰精勤演律達真風釋子南禪道少同南中多長老禪僧奧旨筌蹄悟佛理慧燈廣布九圍中真迹今藏本寺廟宇門第十二吳大帝廟𨽻府城西門外今廟庭即當時舊宫唐大中初邑人台州永寧簿周知業以家資重修建炎間兵火廢毁其地在石頭城清涼寺之西今去府七里楊修有詩云古朩隂森廟巋然龍蟠虎踞舊山川當時鼎足一場夢空裡旋風飛紙錢蔣帝廟帝即後漢秣陵尉蔣子文金陵圗經云漢末子文為秣陵尉逐盜鍾山傷額而死嘗自謂骨貴死當為神及吳大帝遷都建鄴子文乘白馬執白羽扇見形故吏白吳帝為立廟不爾百姓大疫權猶未信翼日復見于路云當令飛蠱入人耳後如其言帝乃立廟于鍾山封子文為蔣侯權避祖諱因改鍾山曰蔣山晉蘇峻之難鍾山神同蔣侯為助且曰蘇峻為逆當共誅鋤之後果斬峻按杜佑通典宋髙帝永初二年普禁淫祀自蔣子文祠以下皆絶孝建初修復加蔣侯爵位至相國大都督中外諸軍事明帝初四方兵起求救於神遂封為蔣王齊永明中崔慧景之難迎神還臺以求福助事平授以帝位又按南史梁武帝天監六年旱甚詔祈蔣神求雨十旬不降帝命載荻焚其廟當神上俄有雲如繖倐忽驟雨如㵼臺中宫殿振動帝懼馳詔追停少時乃靜自此帝益畏信是時魏軍圍鍾離蔣帝神報敕必許扶助既而無雨水長遂挫敵人凱旋之後廟中人馬腳盡泥濕當時目覩焉齊既封以帝號於是以廟門為靈光之門中門為興善之門外殿曰帝山內殿曰神居西閣有佛殿名靈鷲東閣即子文所居也南唐追諡曰莊武帝更修廟宇開寶八年焚毁雍熙四年邑人張革于舊基重建景祐二年知府陳待制執中復增修之朝廷賜廟額曰惠烈政和八年本縣復加修飾有南唐及景祐政和廟記可考今𨽻蔣山之北去城二十里晉元帝廟舊在卞將軍廟側今移在嘉瑞坊城隍廟之左武烈帝廟舊經云隋司徒陳杲仁有戰功唐封忠烈公偽册武烈帝本廟在江夏楚平王廟吳越春秋云楚平王都于固城廟今在溧水縣南九十里昔周成王封熊繹子男之田于蠻荆之地至莊王時賜姓為芈音敉楚姓氏至靈王立與敵日尋干戈邊鄙不寧時吳軍失利乃陷瀨渚至平王用佞臣之言殺太傅伍奢并其子尚子胥奔吳吳用之破楚而入郢此廟即平王之舊址也唐廣明元年重修晉謝將軍廟即晉謝玄也咸通九年置開寶四年重修在府城西南三里晉卞忠正廟晉尚書令贈侍中驃騎將軍卞壼諡忠正蘇峻之亂與其二子力戰死之葬吳冶城今天慶觀乃其地也後七十餘年盜發其墓尸僵如生鬢髮蒼然瓜甲穿手背安帝賜錢十萬封之入梁復毁武帝又加修治李氏有江南建中正亭于其墓穿地得斷碑公名存焉徐鍇實為之識本朝慶歷中知府事龍圗閣直學士葉公清臣又封墓刻石表之改亭名曰忠孝取其母之言曰父為忠臣子為孝子也又五十年左丞葉公夢得來守是邦即亭為堂圗公像列之常祀春秋祠焉乃為之記晉隂山廟在縣南向西十二里舊經云建武中丞相王導於岡阜間隱約見數十步騎駐立于壠上導怪之使人致問俄失其所夜見夢于導曰我乃隂山神也昨隨帝渡江寓泊于晨見之所卿為我置祠當福晉祚導乃以其事聞上置廟于此仍名其岡為隂山楊修詩曰爐香煙斷暮雲凝隂德山髙衆所稱開府琅邪舊蒙福龍飛一馬至中興梁祈澤夫人廟梁置今𨽻祈澤寺之側舊經云有初法師者嘗講法華經于山中有女郎來聽初問之答曰兒東海龍王女也師告以山中乏水後數日忽聞風雨暴作向曉有泉出于座下後遂為水旱祈禱之所因號祈澤夫人紹興元年旱禱有應本府狀其事于朝且言已有祈澤夫人之號因賜廟額曰嘉惠今去城二十三里青溪夫人廟按輿地志青溪岸側有神祠世謂青溪姑南朝甚有靈驗嘗見形于人祠今與上水閘相近説者云隋平陳斬張麗華孔貴妃於青溪柵下今祠像有三婦人乃青溪姑與二妃也潘真君廟舊經云昔潘氏兄弟三人於此山中得道化白鶴沖天後人思而立廟在溧陽縣東南六十里三鶴山下茅君白鶴廟茅山白鶴廟記云此廟即祠三茅君之所也霓旌屢降鶴駕時逢茅君分理于赤城玉洞每年以十二月二日駕白鶴于此會諸真君故名焉在句容縣東南三里荆將軍廟舊經云荆軻廟也烈士傳曰昔左伯桃羊角哀往楚併糧于梁山左伯桃死而角哀達乃厚葬伯桃于梁山下一夕角哀夢伯桃告曰幸感所葬奈何與荆將軍墓相鄰每地下與吾戰為之困迫今年九月十五日將大戰至時望子借兵馬于冢上呌噪相助角哀覺而悲之如期而往曰今在冢上安知我友地下之勝負乃命開棺自刎而死報併糧之義也廟在溧水縣南四十五里茅司徒廟按稽神録云浙西僧德林少時逰舒州路見一夫荷鋤治方丈之地左右數十里不見居人問之對曰頃時自舒之桐城至此暴得痁疾不能去因卧草中及稍醒已昏矣四望無人惟虎豹吼呌自分必死俄有一人部從如大將至此下馬良久召二卒曰善守此人明日送到桐城縣下遂上馬去倐忽不見惟二卒在焉某即強起問之答曰此茅將軍也常夜出獵虎憂汝被傷故使護汝更欲問即日已出矣不復見二人即起而行意甚輕健至桐城頃之疾愈以所見處立祠祀之德林止舒州十年及回則村落皆立茅將軍廟今俗呼茅司徒在溧陽縣東門外一里菩提王廟神即楚大夫靳尚也今在攝山按神録楚靳神居臨沂縣舊經云齊永明初有法度禪師講經于攝山嘗患山路磽確僧徒疲於往來神為平治之法度因為受菩提戒立祠于彼故世號菩提王江揔棲霞寺碑云梁大同元年二月神又見形著菩提巾披袈裟容止甚都來入禪堂請寺衆説法廟舊在山前今移置棲霞寺門之右二判官廟舊經云本延祚院土地神唐會昌中寺廢景福二年神託夢于里人曰我二判官也久為延祚寺伽藍今巳遷次于寺外可為我置祠當福於爾既而夜見火光連天人即潛于光所窺見炬篲熒熒焉因就其地建廟祀之在府西門裡楚靳尚廟攝山記云楚靳尚以讒殺屈原為天所譴作一大蟒穴在山後人為之立廟楊修有詩云汨羅魚腹葬靈均競渡如飛不救人天意明知讒口毒果遭天譴作蛇身五龍堂府城西門外古太一觀基也南唐保大八年改為舞雩祠十三年有玄光尊像乘一朩自江中流泛及岸而止道衆迎接入堂供事之徐鍇嘗作記述其事興德王廟偽吳天祚二年李先主升夢中見其神因立廟祀今廢其地在鍾山蔣帝廟之北去城十三里炳靈公廟偽唐升元中置按五代史後唐長興四年封東嶽三郎為威雄將軍大中祥符元年奉敕封炳靈公廟在府城新橋之西張僕射廟舊經云唐天祐中有清河張司徒者營建金陵百姓懷而祀之今呼張僕射廟廟之北相去四里有南唐張懿公墓道或云僕射即懿公也名君詠字德之嘗為特進太子太傅初不曾任司徒其説未詳今在府城西門外十里墳陵門第十三吳大帝陵吳志神鳳元年大帝崩葬蔣陵按樂史寰宇記在縣東北蔣山八里丹陽記云蔣陵因山為名輿地志曰九日臺當孫陵曲折之傍故名蔣陵亭蘇峻之亂王師敗績于西陵即此地也今蔣廟相對向西有曰孫陵岡是為蔣陵吳步夫人陵吳志赤烏元年追拜夫人步氏為皇后後合葬蔣陵今蔣廟西南有孫陵岡上有步夫人墩墩之側有夫人冢乃其地也吳宣明太子墳吳志孫權皇太子登諡宣明太子初葬句容後三年移葬鍾山西蔣陵吳甘寧墓伏滔記吳將甘寧墓在直瀆之下俗云墓有王氣孫皓惡之鑿其後為直瀆溫庭筠過吳主陵詩其略云虛聞直瀆三十里青蓋何曾到洛陽蓋譏之也吳葛仙公墓吳太極左仙翁葛玄墓在句容縣西南一里郡國志云句曲有葛玄冢晉元帝陵建康實録晉元帝永昌元年春葬建平陵在雞籠山之陽不起墳晉明帝陵建康實録晉明帝大寧三年葬武平陵在雞籠山之陽不起墳晉成帝陵建康實録晉成帝咸康八年葬興平陵在雞籠山之陽與元帝同處不起墳晉康帝陵建康實録晉康帝建元三年葬崇平陵𨽻鍾山之陽不起墳晉穆帝陵建康實録晉穆帝升平五年葬永平陵𨽻幕府山之陽起墳今幕府山前近西里俗相傳有穆天子墳即其地也晉哀帝陵建康實録晉哀帝興寧三年葬安平陵𨽻雞籠山之陽不起墳晉簡文帝墳建康實録晉簡文帝咸安二年葬髙平陵在鍾山之陽不起墳晉孝武帝墳建康實録晉孝武帝太元二十一年葬隆平陵在鍾山之陽不起墳晉安帝陵建康實録晉安帝義熙十四年崩明年葬休平陵在鍾山之陽不起墳晉恭帝陵建康實録晉恭帝元熙二年葬沖平陵在鍾山之陽安帝同處不起墳按東晉十一帝元明成哀四陵在雞籠山之陽簡文武安恭五陵在鍾山之陽並不起墳今不復可辨惟穆帝一陵在幕府山起墳晉山簡墓建康實録晉永嘉六年征南將軍荆州刺史山簡卒歸葬建康真武湖南覆舟山之陽輿地志云山簡墓在樂遊苑內晉溫嶠墓建康實録晉溫嶠初葬豫章朝廷追思之乃為造大墓遷葬元明陵北幕府山之陽按晉書嶠拜驃騎將軍開府儀同三司散騎常侍封始安郡公初葬豫章後朝廷追嶠勳德將為造大墓於元明二帝陵之北陶侃上表願停移葬詔從之其後嶠妻何氏卒子放之便載喪還詔葬建平陵北即是嶠妻何氏墓非嶠墓也晉郭璞墓真武湖中有大墩里俗相傳曰郭璞墓按晉王敦加荆州牧敦將舉兵使璞筮璞曰無成敦怒收璞斬之當時或歸葬于此晉竺使君墓𨽻金陵鄉張陳湖墓前有二碑以晉書參考之乃寧朔將軍竺瑶嘗為桓溫部將太和五年破袁瑾于武丘宋武帝陵建康實録宋髙祖永初三年葬初寧陵𨽻丹陽建康縣蔣山圗經云在縣東北二十里政和間有人于蔣廟側得一石柱題云初寧陵西北隅以此考之其墳當去蔣廟不逺宋文帝陵建康實録宋文帝元嘉三十年葬長寧陵圗經云𨽻縣東北二十五里與武帝陵相近今未詳所在宋文帝袁后陵南史宋元嘉十七年葬先皇后袁氏于長寧陵長寧即文帝陵也宋明宣沈太后陵南史宋明宣沈太后為文帝美人生明帝元嘉三十年葬建康之幕府山今寶林寺西南有墳壠相傳為國婆墳疑即沈后所葬之地宋明帝陵建康實録宋明帝泰豫元年葬髙寧陵𨽻臨沂縣幕府山西與王導墳相近今山前有墳壠晉穆帝陵在山南或以西為明帝之墓大司徒甄邯墓圗經云在縣北七里後湖之側按南史宋張永嘗開真武湖遇古冢冢上得一銅斗有柄文帝以訪朝士何承天曰此斗王莽三公亡皆賜之一在冢外一在冢內時三台居江左者惟甄邯此必邯之墓及啓冡又得一斗復有一石銘云大司徒甄邯之墓今未詳所在宋謝濤墓按土山淨名寺新得古碑云宋散騎常侍謝濤元嘉十七年葬于揚州丹陽郡建康縣東鄉土山里宋謝濤夫人王氏墓夫人琅琊王氏大明七年合祔于土山里謝濤之墓有古碑可考夫人之祖曰獻之父曰靜之冥漠君墓宋書云元嘉七年彭城王義康修東府城城塹中得古冢為之改葬使法曹參軍謝惠連為祭文其略云東府掘城北塹入丈餘得古冢上無封域不用甎甓銘志不存世代不可得而知也公命城者改埋東岡祭之以豚酒既不知其名字逺近故假為之號曰冥漠君云爾齊明欽劉皇后墓南史齊明欽劉皇后髙帝為明帝納之永明七年葬江乘縣張山今𨽻淳化鎮之北齊獻武公墓在栖霞寺側有碑額云齊故侍中尚書令丞相巴東獻武公之墓齊明僧紹墓𨽻攝山栖霞寺前明隱君僧紹舊居攝山後葬此今去城四十五里梁吳平忠侯墓南史梁吳平忠侯蕭景字子照諡曰忠墓在花林之北有石麒麟二石柱一題云梁故侍中撫將軍開府儀同三司吳平忠侯蕭公之神道今去城三十五里梁始興王墓南史梁始興王蕭憺諡曰忠武墓在清風鄉黃城村有石麒麟四及神道碑云梁故侍中司徒驃騎將軍始興忠武王之碑今去城三十七里梁安成王墓南史梁安成王蕭秀字彥達諡曰康墓在甘家巷有石麒麟二石柱一及神道碑二題云梁故散騎常侍司空安成康王之神道南史稱佐史夏侯亶等表立碑志王僧孺陸倕劉孝綽裴子野各製其文欲擇而用之咸稱實録遂四碑並建今所存者二其一巳磨滅其一字畫猶可讀乃彭城劉孝綽文也去城三十八里梁臨川王墓南史梁臨川王蕭宏字宣達諡曰靖惠墓在北城鄉有石柱碑二題云梁故史黃鉞侍中大將軍揚州牧臨川靖惠王之神道去城三十里梁建安侯墓南史梁建安侯蕭正立諡曰敏墓在淳化鎮西宋野石柱塘有石柱二題云梁故侍中左衛將軍建安敏侯之神道去城三十五里陳髙祖陵建康實録陳髙祖永定三年葬髙安陵𨽻縣東南古彭城驛側今縣東崇禮鄉地名陵里有曰天子林其地有石麒麟二里俗相傳即陳髙祖墓也去城二十五里陳文帝陵建康實録陳文帝天康元年葬永寧陵𨽻縣東北陵山之南今鴈門山之北左伯桃墓烈士傳曰左伯桃羊角哀燕人也二人為友同時遊學聞楚王待士乃同入楚至梁山值雨雪糧少伯桃乃併糧與角哀令往事楚自入于空樹中餓死角哀至楚為上大夫乃告楚王備禮葬左伯桃于此唐大厯六年魯公顔真卿經此以詩弔之書於莆塘在溧水縣南四十三里雙女墓雙女墳記曰有雞林人崔致逺者唐乾符中補溧水尉嘗憩于招賢館前岡有冢號曰雙女墳詢其事迹莫有知者因為詩以弔之是夜感二女至稱謝曰兒本宣城郡開化縣馬陽鄉張氏二女少親筆硯長負才情不意為父母匹于鹽商小竪以此憤恚而終天寶六年同葬于此宴語至曉而别在溧水縣南一百一十里南唐張懿公墓公名君詠字德之有神道碑題云大唐順天翊運功臣特進守太子太傅上柱國清河郡開國張懿公神道去府城十里在石頭城後南唐李順公墓公名金全字德鏐有神道碑題云唐故開府儀同三司檢校太尉兼侍中贈中書令李順公神道在城西金陵鄉七里鋪南唐髙越墓攝山棲霞寺舊門外北山之麓有石題云侍郎髙府君墓去縣四十五里碑刻門第十四吳孫皓封禪碑在常州宜興縣封禪山磨崖而刻今尚存吳天璽元年紀功三斷石碑皇象書晉侍中右光祿大夫西平靖侯顔公大宗碑公名含字𢎞都今在府學顔真卿書晉右光祿大夫西平靖侯顔府君碑真卿書今在府學晉建威將軍思平縣侯竺使君銘在金陵鄉張陳湖晉建威將軍思平縣侯竺使君頌在張陳湖碑石損斷宋謝濤夫人王氏墓記在土山淨名寺後菜圃中今移在上元縣齊侍中尚書令巴東獻武公碑在黃城村梁普通三年造梁侍中司徒驃騎將軍始興忠武王碑徐勉造貝義淵書在清風鄉黃城村梁散騎常侍司空安成康王碑劉孝綽撰貝義淵書在清風鄉甘家巷梁永陽昭王墓志銘徐勉造在清風鄉居民井側今在上元縣梁永陽敬太妃墓志銘徐勉造在清風鄉路傍梁臨川靖惠王神道在北城鄉梁侍中吳平忠侯蕭公神道在清風鄉花林村梁建安敏侯神道在鳳城鄉淳化鎮西梁上清真人許長史舊館壇碑丹陽陶𢎞景撰并書梁普通三年五月五日記唐紫陽觀主劉行矩等重勒在句容玉晨觀陳江揔棲霞寺碑在攝山陳宫井欄題刻在法寶寺之西邦人云字漫滅惟戒哉二字可辨今不知其所平陳碑隋薛道衡撰文虞世南書在石頭城西大唐髙宗明徵君碑在攝山棲霞寺髙宗撰髙正臣書大唐棲霞寺齋會記太和五年立大唐棲霞寺律大師碑大厯四年立大唐重建開善寺記在蔣山寺大唐玉清觀四等碑開元十五年立陶臣莊書碑石損斷今置崇禮鄉玉清觀基上大唐沈傳師齋疏徐鉉題名在棲霞寺千佛嶺大唐王法主碑鳳閣侍郎同鳳閣鸞臺三品𢎞文館學士劉禕之文唐文明元年立在茅山崇玄觀大唐紫陽觀碑太子右諭德徐鉉文尚書虞部郎中楊元鼎書并篆額在茅山玉晨觀大唐玄靖先生李含光碑湖州刺史魯郡公顔真卿文并書在玉晨觀大唐道場茅山孫尊師詩碑唐司空兼門下侍郎平章事李德裕述前知鹽鐵轉運使上柱國裴質方書在玉晨觀大唐三洞景昭大法師韋君碑檢校國子司業吳縣開國男陸長源文檢校尚書兵部郎中兼侍御史竇泉書并篆額唐貞元三年立在玉晨觀大唐卞泊宫記觀察判官監察御史裏行王師簡文𢎞文館校書郎段令緯篆額在玉晨觀大唐許真人井銘徐鉉文并書在玉晨觀大唐祠宇宫白鶴廟記大厯十三年三月立尚書水部員外郎河東栁識文華陽崖舍退士中山劉鳴素書在鴻禧院大唐義女碑李白文在溧陽縣瀨陽江北偽吳興化院銅鐘鑄文徐溫鑄在丹陽鄉香林寺偽吳矴石鑄文順義元年鑄在靖安鎮南唐方山寶華宫碑在方山崇真觀南唐洞元觀請鐘記在崇真觀南唐寶華宫功德什物在崇真觀南唐李順公神道碑髙越書在石頭城北南唐張懿公神道碑朱銑書在石頭城後南唐蔣莊武帝廟碑徐鉉撰朱銑書圖經云巳亡今碑石在蔣廟門外此圖經之誤也南唐夫人易氏墓志額在土山淨名寺南唐李後主祭悟空禪師文并親書德慶堂三字在清涼寺南唐開善寺井記在蔣山寺南唐義井欄刻字在石頭城後七里鋪南唐僧用虛題棲霞寺詩在本寺千佛嶺景德棲霞寺殿記在本寺髙陟撰景祐重造蔣廟碑凌陽景撰今置蔣廟庭下惠烈廟記在蔣廟曹熙立蔣廟篆祭文蔣堂文邵必篆今在廟中道光泉記王安國撰在蔣山寺八功德水記梅摯撰在蔣山悟真庵後蔣山太平興國寺莊田記僧贊元立蕭帝寺記元絳撰在法光寺今名鹿苑寺子隱堂記梅摯撰在法光寺白雲菴記王安國撰在棲霞寺寶禪師語録序米芾書在惟政鄉半山寺宋齊邱鳳臺詩刻在保寧寺溧水長潘元卓校官碑今在溧水縣漢碑附此六朝事迹編類卷下
